<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0b1120">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Darbuka Tab Player</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --glass-bg: rgba(255,255,255,0.06); --glass-border: rgba(255,255,255,0.12); }
    * { box-sizing: border-box; }
    body { background: #0b1120; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; min-height: 100vh; }
    .liquid-bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(circle at 20% 30%, #1e3a8a 0%, transparent 50%), radial-gradient(circle at 80% 70%, #7c3aed 0%, transparent 45%), radial-gradient(circle at 50% 50%, #0c4a6e 0%, transparent 60%), linear-gradient(160deg, #0f172a 0%, #020617 100%); }
    .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.3; animation: drift 18s infinite cubic-bezier(0.4, 0, 0.2, 1); }
    .orb-1 { width: 450px; height: 450px; background: #3b82f6; top: -15%; left: -15%; }
    .orb-2 { width: 350px; height: 350px; background: #8b5cf6; bottom: -10%; right: -10%; animation-delay: -7s; }
    .orb-3 { width: 280px; height: 280px; background: #06b6d4; top: 50%; left: 40%; animation-delay: -13s; }
    @keyframes drift { 0%, 100% { transform: translate(0,0) scale(1) rotate(0deg); } 50% { transform: translate(40px,-35px) scale(1.08) rotate(10deg); } }
    .glass { background: var(--glass-bg); backdrop-filter: blur(24px) saturate(1.5); -webkit-backdrop-filter: blur(24px) saturate(1.5); border: 1px solid var(--glass-border); box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1); }
    .glass-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
    .glass-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%); opacity: 0; transition: opacity 0.2s; }
    .glass-btn:hover::before { opacity: 1; }
    .glass-btn:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.2); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
    .glass-btn:active { transform: translateY(0); }
    textarea { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent; caret-color: #60a5fa; }
    textarea::-webkit-scrollbar { width: 6px; } textarea::-webkit-scrollbar-track { background: transparent; } textarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    textarea:focus { outline: none; }
    .note-pill { display: inline-flex; align-items: center; justify-content: center; padding: 0.3em 0.5em; margin: 0.12em; border-radius: 0.5em; font-family: 'Courier New', monospace; font-weight: 700; font-size: 0.88em; transition: all 0.15s ease; border: 1px solid transparent; user-select: none; }
    .note-pill.active { transform: scale(1.15); box-shadow: 0 0 16px currentColor; border-color: rgba(255,255,255,0.4); z-index: 10; }
    .note-d { background: rgba(59,130,246,0.3); color: #93c5fd; } .note-t { background: rgba(168,85,247,0.3); color: #c084fc; }
    .note-k { background: rgba(234,179,8,0.3); color: #facc15; } .note-s { background: rgba(239,68,68,0.3); color: #f87171; }
    .note-lt { background: rgba(192,132,252,0.3); color: #c084fc; } .note-lk { background: rgba(250,204,21,0.3); color: #facc15; }
    .note-b { background: rgba(244,63,94,0.3); color: #fb7185; } .note-r { background: rgba(51,65,85,0.3); color: #64748b; }
    .pulse-ring { animation: pulseRing 2s infinite; }
    @keyframes pulseRing { 0% { box-shadow: 0 0 0 0 rgba(96,165,250,0.6); } 70% { box-shadow: 0 0 0 10px rgba(96,165,250,0); } 100% { box-shadow: 0 0 0 0 rgba(96,165,250,0); } }
    #visualizer { width: 100%; height: 60px; border-radius: 0.75rem; overflow: hidden; }
    .tab-preview { min-height: 48px; max-height: 300px; overflow-y: auto; scroll-behavior: smooth; }
    .modal-hidden { pointer-events: none; opacity: 0; visibility: hidden; }
    .modal-visible { pointer-events: auto; opacity: 1; visibility: visible; }
    .modal-panel-hidden { transform: scale(0.95); opacity: 0; }
    .modal-panel-visible { transform: scale(1); opacity: 1; }
    .track-body-hidden { display: none; }
    .track-body-visible { display: block; }
    .track-card { transition: all 0.3s ease; }
    .track-card.muted { opacity: 0.4; }
    input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; cursor: pointer; }
    input[type=range]::-webkit-slider-runnable-track { background: rgba(255,255,255,0.15); border-radius: 999px; height: 6px; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; margin-top: -5px; width: 16px; height: 16px; border-radius: 50%; background: #60a5fa; border: 2px solid #fff; }
    .slot-card { transition: all 0.2s ease; }
    .slot-card:hover { border-color: rgba(96,165,250,0.4); background: rgba(255,255,255,0.08); }
    .slot-card.active { border-color: rgba(96,165,250,0.6); background: rgba(96,165,250,0.1); }
    .slot-card.empty { opacity: 0.5; }
    .preview-track-row { margin-bottom: 0.75em; }
    .preview-track-label { font-size: 0.75em; font-weight: 600; margin-right: 0.5em; padding: 0.15em 0.5em; border-radius: 0.35em; display: inline-flex; align-items: center; gap: 0.4em; }
    @media (max-width: 640px) { .glass-btn { font-size: 0.85rem; padding: 0.5rem 0.75rem; } .note-pill { font-size: 0.82rem; padding: 0.22em 0.45em; } }
  </style>
</head>
<body class="text-white">
  <div class="liquid-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
  <main class="relative z-10 w-full max-w-3xl mx-auto p-4 md:p-6">
    <header class="text-center mb-6">
      <div class="glass inline-flex items-center gap-3 px-6 py-3 rounded-2xl">
        <span class="text-3xl" role="img">🥁</span>
        <div class="text-left">
          <h1 class="text-2xl md:text-3xl font-bold tracking-tight bg-gradient-to-r from-blue-300 via-cyan-300 to-purple-300 bg-clip-text text-transparent">Darbuka Tab</h1>
          <p class="text-white/50 text-xs mt-0.5">Multi-Track • Web Audio Synthesizer • PWA</p>
        </div>
      </div>
    </header>
    <div class="glass rounded-2xl p-3 mb-4"><canvas id="visualizer"></canvas></div>
    <div class="glass rounded-2xl p-4 mb-4">
      <div class="flex flex-wrap items-center justify-center gap-3">
        <div class="flex items-center gap-2 bg-black/20 border border-white/10 rounded-xl px-3 py-2">
          <label for="bpm" class="text-xs font-medium text-white/60 uppercase tracking-wider">BPM</label>
          <input type="number" id="bpm" value="120" min="30" max="300" step="1" class="bg-transparent w-14 text-center font-mono text-lg outline-none focus:ring-1 focus:ring-blue-400/50 rounded">
          <div class="flex flex-col gap-0.5">
            <button id="bpmUp" class="w-6 h-3 bg-white/10 rounded-t flex items-center justify-center text-xs hover:bg-white/20">▲</button>
            <button id="bpmDown" class="w-6 h-3 bg-white/10 rounded-b flex items-center justify-center text-xs hover:bg-white/20">▼</button>
          </div>
        </div>
        <button id="playBtn" class="glass-btn px-6 py-3 rounded-xl font-semibold text-blue-200 flex items-center gap-2 min-w-[140px] justify-center">
          <svg id="playIcon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <span id="playText">Старт</span>
        </button>
        <button id="stopBtn" class="glass-btn px-5 py-3 rounded-xl font-semibold text-red-200 flex items-center gap-2 opacity-50 pointer-events-none">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v12H6z"/></svg>
          Стоп
        </button>
      </div>
      <div class="mt-3 flex items-center gap-2 text-xs text-white/50">
        <span>Громкость:</span>
        <input type="range" id="volume" min="0" max="1" step="0.05" value="0.8" class="flex-1">
        <span id="volumeVal">80%</span>
        <button id="openSettings" class="ml-auto glass-btn px-3 py-1.5 rounded-lg text-xs text-white/70 border-white/20">⚙️ Звуки</button>
      </div>
    </div>
    <div class="glass rounded-2xl p-1 mb-4">
      <div class="flex gap-1 mb-3 px-2 pt-2">
        <button id="tabEditor" class="flex-1 py-2 text-sm font-medium rounded-xl bg-white/10 text-blue-200 transition-all">Дорожки</button>
        <button id="tabPreview" class="flex-1 py-2 text-sm font-medium rounded-xl text-white/60 transition-all hover:text-white">Превью</button>
      </div>
      <div id="editorPanel" class="px-2 pb-2">
        <div id="tracksContainer" class="space-y-3"></div>
        <div class="flex gap-2 mt-3 flex-wrap">
          <button id="addTrackBtn" class="glass-btn px-4 py-2 rounded-xl text-sm font-medium text-green-200/80 border-green-500/20">+ Дорожка</button>
          <button id="saveBtn" class="glass-btn flex-1 py-2 rounded-xl text-sm font-medium text-white/70 border-white/20 min-w-[100px]">💾 Сохранить</button>
          <button id="loadBtn" class="glass-btn flex-1 py-2 rounded-xl text-sm font-medium text-white/70 border-white/20 min-w-[100px]">📂 Загрузить</button>
          <button id="clearBtn" class="glass-btn flex-1 py-2 rounded-xl text-sm font-medium text-red-200/80 border-red-500/20 min-w-[100px]">🗑 Очистить</button>
        </div>
        <div class="flex items-center gap-2 mt-2 mb-2 px-1">
          <span class="text-xs text-white/50">Слот:</span>
          <button id="currentSlotBtn" class="glass-btn px-3 py-1.5 rounded-lg text-xs text-blue-200 font-mono">Слот 1</button>
          <button id="openSlotsBtn" class="glass-btn px-3 py-1.5 rounded-lg text-xs text-white/70">📋 Управление слотами</button>
        </div>
      </div>
      <div id="previewPanel" class="hidden px-2 pb-2">
        <div id="noteDisplay" class="tab-preview bg-black/20 border border-white/10 rounded-xl p-4 min-h-[80px]"></div>
      </div>
    </div>
    <div class="glass rounded-2xl p-3 flex items-center justify-between">
      <div id="status" class="text-sm font-medium text-white/60 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-green-400/60"></span> Готово</div>
      <div id="noteCount" class="text-xs text-white/40">Нот: 0 | Длительность: 0с</div>
    </div>
    <footer class="mt-4 text-center space-y-2">
      <div class="flex flex-wrap justify-center gap-1.5 text-xs">
        <span class="note-pill note-d">D</span><span class="text-white/40">Dum</span>
        <span class="note-pill note-t">T</span><span class="text-white/40">Tak</span>
        <span class="note-pill note-k">K</span><span class="text-white/40">Ka</span>
        <span class="note-pill note-s">S</span><span class="text-white/40">Slap</span>
        <span class="note-pill note-lt">t</span><span class="text-white/40">tek</span>
        <span class="note-pill note-lk">k</span><span class="text-white/40">kak</span>
        <span class="note-pill note-b">B</span><span class="text-white/40">Bek</span>
        <span class="note-pill note-r">-</span><span class="text-white/40">Rest</span>
      </div>
      <p class="text-white/30 text-xs">Цифра = длительность (D2=2 доли). Пробелы игнорируются. <code class="bg-white/10 px-1 rounded">(DB)</code> = аккорд.</p>
    </footer>
  </main>

  <div id="settingsModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm transition-all duration-300 modal-hidden">
    <div id="settingsPanel" class="glass w-full max-w-4xl rounded-3xl p-6 relative transform transition-all duration-300 modal-panel-hidden">
      <button id="closeSettings" class="absolute top-4 right-4 text-white/60 hover:text-white transition-colors z-10">✕</button>
      <h2 class="text-xl font-bold mb-4 bg-gradient-to-r from-blue-300 to-purple-300 bg-clip-text text-transparent">Настройка синтеза и сэмплов</h2>
      <div class="flex gap-3 mb-4 flex-wrap items-center">
        <label class="text-xs text-white/50">Реверберация:</label>
        <input type="range" id="reverbMix" min="0" max="1" step="0.05" value="0.25" class="w-32 accent-blue-400"><span id="reverbVal" class="text-xs text-white/60">25%</span>
        <label class="text-xs text-white/50 ml-2">Тон:</label>
        <input type="range" id="toneControl" min="1000" max="12000" step="500" value="6000" class="w-32 accent-blue-400"><span id="toneVal" class="text-xs text-white/60">6kHz</span>
      </div>
      <div id="settingsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 max-h-[45vh] overflow-y-auto pr-2"></div>
      <div class="flex justify-end gap-3 border-t border-white/10 pt-4">
        <button id="resetAllSettings" class="glass-btn px-4 py-2 rounded-xl text-sm text-white/70">Сбросить всё</button>
        <button id="saveSettings" class="glass-btn px-4 py-2 rounded-xl text-sm text-blue-200">Применить</button>
      </div>
    </div>
  </div>

  <div id="slotsModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm transition-all duration-300 modal-hidden">
    <div id="slotsPanel" class="glass w-full max-w-2xl rounded-3xl p-6 relative transform transition-all duration-300 modal-panel-hidden">
      <button id="closeSlots" class="absolute top-4 right-4 text-white/60 hover:text-white transition-colors z-10">✕</button>
      <h2 class="text-xl font-bold mb-4 bg-gradient-to-r from-blue-300 to-purple-300 bg-clip-text text-transparent">Управление слотами</h2>
      <div id="slotsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6"></div>
      <div class="flex justify-between border-t border-white/10 pt-4">
        <button id="deleteSlotBtn" class="glass-btn px-4 py-2 rounded-xl text-sm text-red-200/80 border-red-500/20">🗑 Удалить слот</button>
        <div class="flex gap-2">
          <button id="selectSlotBtn" class="glass-btn px-4 py-2 rounded-xl text-sm text-blue-200">Выбрать</button>
          <button id="loadSelectedSlot" class="glass-btn px-4 py-2 rounded-xl text-sm text-green-200">📂 Загрузить</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';
      try {
        var m = { name: "Darbuka Tab Player", short_name: "Darbuka", start_url: ".", display: "standalone", background_color: "#0b1120", theme_color: "#0b1120" };
        var b = new Blob([JSON.stringify(m)], {type: 'application/json'});
        document.head.appendChild(Object.assign(document.createElement('link'), {rel: 'manifest', href: URL.createObjectURL(b)}));
      } catch(e) {}

      var NUM_SLOTS = 8, currentSlot = 1, selectedSlotInModal = 0;
      var customSamples = {};
      var sampleStorageLimit = 2000000;

      var els = {
        bpm: document.getElementById('bpm'), bpmUp: document.getElementById('bpmUp'), bpmDown: document.getElementById('bpmDown'),
        volume: document.getElementById('volume'), volumeVal: document.getElementById('volumeVal'),
        playBtn: document.getElementById('playBtn'), playIcon: document.getElementById('playIcon'), playText: document.getElementById('playText'),
        stopBtn: document.getElementById('stopBtn'), openSettings: document.getElementById('openSettings'),
        saveBtn: document.getElementById('saveBtn'), loadBtn: document.getElementById('loadBtn'), clearBtn: document.getElementById('clearBtn'),
        addTrackBtn: document.getElementById('addTrackBtn'),
        tabEditor: document.getElementById('tabEditor'), tabPreview: document.getElementById('tabPreview'),
        editorPanel: document.getElementById('editorPanel'), previewPanel: document.getElementById('previewPanel'),
        noteDisplay: document.getElementById('noteDisplay'), tracksContainer: document.getElementById('tracksContainer'),
        status: document.getElementById('status'), noteCount: document.getElementById('noteCount'),
        canvas: document.getElementById('visualizer'),
        settingsModal: document.getElementById('settingsModal'), settingsPanel: document.getElementById('settingsPanel'),
        closeSettings: document.getElementById('closeSettings'), settingsGrid: document.getElementById('settingsGrid'),
        saveSettings: document.getElementById('saveSettings'), resetAllSettings: document.getElementById('resetAllSettings'),
        currentSlotBtn: document.getElementById('currentSlotBtn'), openSlotsBtn: document.getElementById('openSlotsBtn'),
        slotsModal: document.getElementById('slotsModal'), slotsPanel: document.getElementById('slotsPanel'),
        closeSlots: document.getElementById('closeSlots'), slotsGrid: document.getElementById('slotsGrid'),
        selectSlotBtn: document.getElementById('selectSlotBtn'), loadSelectedSlot: document.getElementById('loadSelectedSlot'),
        deleteSlotBtn: document.getElementById('deleteSlotBtn'),
        reverbMix: document.getElementById('reverbMix'), reverbVal: document.getElementById('reverbVal'),
        toneControl: document.getElementById('toneControl'), toneVal: document.getElementById('toneVal')
      };

      var ctx2d = els.canvas.getContext('2d');
      var resizeCanvas = function() { var r = els.canvas.getBoundingClientRect(); if (r.width > 0 && r.height > 0) { els.canvas.width = r.width; els.canvas.height = r.height; } };
      resizeCanvas(); window.addEventListener('resize', resizeCanvas);

      var audioCtx = null, masterGain = null, analyser = null, schedulerTimer = null;
      var reverbNode = null, reverbGain = null, dryGain = null, toneFilter = null;
      var isPlaying = false, nextNoteTime = 0.0, currentIdx = 0;
      var notes = [], bpm = 120, volume = 0.8, reverbAmount = 0.25, toneFreq = 6000;
      var activePills = [], impulseBuffer = null;
      var LOOKAHEAD_MS = 25.0, SCHEDULE_AHEAD_S = 0.1;

      var NOTE_DEFS = {
        D:  { label:'Dum',  css:'d',  midi:35 },
        T:  { label:'Tak',  css:'t',  midi:38 },
        K:  { label:'Ka',   css:'k',  midi:39 },
        S:  { label:'Slap', css:'s',  midi:40 },
        t:  { label:'tek',  css:'lt', midi:42 },
        k:  { label:'kak',  css:'lk', midi:43 },
        B:  { label:'Bek',  css:'b',  midi:44 },
        R:  { label:'Rest', css:'r',  midi:0 }
      };

      var TRACK_COLORS = ['#60a5fa','#c084fc','#facc15','#f87171','#34d399','#fb923c','#38bdf8','#e879f9'];

      var synthConfig = {};
      var tracks = [];
      var trackIdCounter = 0;

      function deepCopy(obj) { return JSON.parse(JSON.stringify(obj)); }

      function defaultSynthConfig() {
        return {
          D:  { freq:82,  decay:0.50, noise:0.02, q:1.5, pitchDrop:0.85, attack:0.005, harm2:0.4, harm3:0.2 },
          T:  { freq:280, decay:0.12, noise:0.10, q:2.0, pitchDrop:0.90, attack:0.002, harm2:0.3, harm3:0.1 },
          K:  { freq:120, decay:0.05, noise:0.80, q:0.8, pitchDrop:0.95, attack:0.001, harm2:0.1, harm3:0.0 },
          S:  { freq:200, decay:0.15, noise:0.30, q:3.0, pitchDrop:0.88, attack:0.002, harm2:0.5, harm3:0.2 },
          t:  { freq:320, decay:0.08, noise:0.08, q:2.5, pitchDrop:0.92, attack:0.001, harm2:0.2, harm3:0.0 },
          k:  { freq:100, decay:0.04, noise:0.70, q:0.6, pitchDrop:0.97, attack:0.001, harm2:0.1, harm3:0.0 },
          B:  { freq:180, decay:0.04, noise:0.50, q:1.8, pitchDrop:0.90, attack:0.002, harm2:0.3, harm3:0.1 }
        };
      }

      function loadSynthConfig() {
        try {
          var saved = localStorage.getItem('darbuka_synth_v8');
          if (saved) {
            var parsed = JSON.parse(saved);
            synthConfig = defaultSynthConfig();
            for (var key in parsed) {
              if (synthConfig[key]) {
                for (var p in synthConfig[key]) {
                  if (parsed[key][p] !== undefined && parsed[key][p] !== null) synthConfig[key][p] = parsed[key][p];
                }
              }
            }
          } else { synthConfig = defaultSynthConfig(); }
        } catch(e) { synthConfig = defaultSynthConfig(); }
      }
      function saveSynthConfig() { try { localStorage.setItem('darbuka_synth_v8', JSON.stringify(synthConfig)); return true; } catch(e) { return false; } }

      function getTrackColor(id) { return TRACK_COLORS[(id - 1) % TRACK_COLORS.length]; }

      function createTrack(name) {
        trackIdCounter++;
        return {
          id: trackIdCounter,
          name: name || ('Дорожка ' + trackIdCounter),
          tab: '',
          volume: 1.0,
          muted: false,
          solo: false
        };
      }

      function initTracks() {
        if (tracks.length === 0) tracks.push(createTrack('Основная'));
      }

      function readTrackTabsFromDOM() {
        tracks.forEach(function(track) {
          var ta = document.querySelector('[data-track-tab="' + track.id + '"]');
          if (ta) track.tab = ta.value;
        });
      }

      function renderTracks() {
        els.tracksContainer.innerHTML = '';
        tracks.forEach(function(track) {
          var card = document.createElement('div');
          card.className = 'track-card glass rounded-2xl p-3' + (track.muted ? ' muted' : '');
          var dot = getTrackColor(track.id);
          var anySolo = tracks.some(function(t) { return t.solo; });
          var isActive = !anySolo || track.solo;

          var headerHtml = '<div class="flex items-center justify-between mb-2 px-1 py-1.5 rounded-lg cursor-pointer select-none hover:bg-white/5" data-track-header="' + track.id + '">';
          headerHtml += '<div class="flex items-center gap-2">';
          headerHtml += '<span class="w-2 h-2 rounded-full shrink-0" style="background:' + dot + '"></span>';
          headerHtml += '<button class="w-7 h-7 rounded-lg text-xs font-bold flex items-center justify-center transition-all shrink-0 ' + (track.solo ? 'bg-yellow-500/30 text-yellow-200 border border-yellow-500/40' : 'bg-white/10 text-white/40') + '" data-toggle-solo="' + track.id + '">S</button>';
          headerHtml += '<button class="w-7 h-7 rounded-lg text-xs font-bold flex items-center justify-center transition-all shrink-0 ' + (track.muted ? 'bg-red-500/30 text-red-200 border border-red-500/40' : 'bg-white/10 text-white/40') + '" data-toggle-mute="' + track.id + '">M</button>';
          headerHtml += '<span class="text-sm font-medium text-white/80 truncate max-w-[100px]">' + track.name + '</span>';
          headerHtml += '</div><div class="flex items-center gap-2">';
          headerHtml += '<span class="text-xs text-white/40 shrink-0">Vol</span>';

      function audioBufferToBase64(buffer) {
        var channels = [];
        for (var c = 0; c < buffer.numberOfChannels; c++) {
          var data = buffer.getChannelData(c);
          var f32 = new Float32Array(data);
          var b64 = btoa(String.fromCharCode.apply(null, new Uint8Array(f32.buffer)));
          channels.push(b64);
        }
        return JSON.stringify({ sampleRate: buffer.sampleRate, numberOfChannels: buffer.numberOfChannels, length: buffer.length, channels: channels });
      }

      function base64ToAudioBuffer(jsonStr) {
        try {
          var data = JSON.parse(jsonStr);
          var buffer = audioCtx.createBuffer(data.numberOfChannels, data.length, data.sampleRate);
          for (var c = 0; c < data.numberOfChannels; c++) {
            var raw = atob(data.channels[c]);
            var bytes = new Uint8Array(raw.length);
            for (var i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
            var floatData = new Float32Array(bytes.buffer);
            buffer.getChannelData(c).set(floatData);
          }
          return buffer;
        } catch(e) { return null; }
      }

      function saveSamplesToStorage() {
        var sampleData = {};
        for (var key in customSamples) {
          if (customSamples[key] && customSamples[key].buffer) {
            try {
              var b64 = audioBufferToBase64(customSamples[key].buffer);
              if (b64.length < sampleStorageLimit) {
                sampleData[key] = { name: customSamples[key].name, bufferB64: b64 };
              }
            } catch(e) { console.warn('Failed to serialize sample:', key, e); }
          }
        }
        localStorage.setItem('darbuka_samples_v8', JSON.stringify(sampleData));
      }

      function loadSamplesFromStorage() {

          var raw = localStorage.getItem('darbuka_samples_v8');

          var data = JSON.parse(raw);
          for (var key in data) {
            if (data[key] && data[key].bufferB64) {
              var buf = base64ToAudioBuffer(data[key].bufferB64);
              if (buf) {
                customSamples[key] = { buffer: buf, name: data[key].name };
              }
            }

        } catch(e) { console.warn('Failed to load samples:', e); }
      }

      function createImpulseResponse() {
        if (!audioCtx || audioCtx.sampleRate <= 0) return null;
        var length = audioCtx.sampleRate * 2.5;
        var impulse = audioCtx.createBuffer(2, length, audioCtx.sampleRate);
        var left = impulse.getChannelData(0), right = impulse.getChannelData(1);
        for (var i = 0; i < length; i++) {
          var t = i / audioCtx.sampleRate;
          var decay = Math.exp(-t * 3.5) * (1 + Math.sin(t * 15) * 0.3);
          left[i] = (Math.random() * 2 - 1) * decay;
          right[i] = (Math.random() * 2 - 1) * decay * 0.95;
          if (i < 100) { left[i] *= i / 100; right[i] *= i / 100; }
        }
        return impulse;
      }

      function initAudio() {

        } else { if (!masterGain) setupAudioNodes(); }
      }

      function setupAudioNodes() {

        toneFilter = audioCtx.createBiquadFilter(); toneFilter.type = 'lowpass'; toneFilter.frequency.value = toneFreq; toneFilter.Q.value = 0.7;
        dryGain = audioCtx.createGain(); dryGain.gain.value = 1.0 - reverbAmount;

      function playNote(type, time, trackVolume) {
        if (!audioCtx || !masterGain || type === 'R') return;
        var cfg = synthConfig[type]; if (!cfg) return;
        var tv = trackVolume !== undefined ? trackVolume : 1.0;
        if (customSamples[type] && customSamples[type].buffer) {
          try {
            var src = audioCtx.createBufferSource(); src.buffer = customSamples[type].buffer;
            var gain = audioCtx.createGain(); gain.gain.value = tv;

          oscGain1.gain.exponentialRampToValueAtTime(0.001, time + dcy);

          var osc2 = null, oscGain2 = null;
          if (h2 > 0.01) {
            osc2 = audioCtx.createOscillator(); osc2.type = 'sine';
            osc2.frequency.setValueAtTime(bf * 2.01, time);
            osc2.frequency.exponentialRampToValueAtTime(Math.max(20, bf * 2.01 * pitchR), time + dcy * 0.3);
            oscGain2 = audioCtx.createGain();
            oscGain2.gain.setValueAtTime(0, time);
            oscGain2.gain.linearRampToValueAtTime(h2 * tv, time + atk);
            oscGain2.gain.exponentialRampToValueAtTime(0.001, time + dcy * 0.7);
          }

          var osc3 = null, oscGain3 = null;
          if (h3 > 0.01) {
            osc3 = audioCtx.createOscillator(); osc3.type = 'sine';
            osc3.frequency.setValueAtTime(bf * 3.02, time);
            osc3.frequency.exponentialRampToValueAtTime(Math.max(20, bf * 3.02 * pitchR), time + dcy * 0.2);
            oscGain3 = audioCtx.createGain();
            oscGain3.gain.setValueAtTime(0, time);
            oscGain3.gain.linearRampToValueAtTime(h3 * tv, time + atk * 0.5);
            oscGain3.gain.exponentialRampToValueAtTime(0.001, time + dcy * 0.5);
          }

          var nLen = Math.max(0.015, dcy * 0.4);
          var bufSize = Math.ceil(audioCtx.sampleRate * nLen);
          var nBuf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
          var nd = nBuf.getChannelData(0);
          for (var i = 0; i < bufSize; i++) { nd[i] = (Math.random() * 2 - 1) * Math.exp(-i / audioCtx.sampleRate / nLen * 4); }
          var noiseSrc = audioCtx.createBufferSource(); noiseSrc.buffer = nBuf;
          var nGain = audioCtx.createGain();
          nGain.gain.setValueAtTime(0, time);
          nGain.gain.linearRampToValueAtTime(noiseAmt * tv, time + atk);
          nGain.gain.exponentialRampToValueAtTime(0.001, time + nLen);

          var filt = audioCtx.createBiquadFilter();

          var clickGain = audioCtx.createGain();
          clickGain.gain.setValueAtTime(0.3 * tv, time); clickGain.gain.exponentialRampToValueAtTime(0.001, time + 0.008);

          noiseSrc.connect(nGain); nGain.connect(filt);
          if (osc2 && oscGain2) { osc2.connect(oscGain2); oscGain2.connect(filt); }
          if (osc3 && oscGain3) { osc3.connect(oscGain3); oscGain3.connect(filt); }
          filt.connect(masterGain);
          
          osc1.start(time); osc1.stop(time + dcy + 0.1);
          clickOsc.start(time); clickOsc.stop(time + 0.015);
          noiseSrc.start(time); noiseSrc.stop(time + nLen + 0.05);
          if (osc2 && oscGain2) { osc2.start(time); osc2.stop(time + dcy * 0.8 + 0.05); }
          if (osc3 && oscGain3) { osc3.start(time); osc3.stop(time + dcy * 0.6 + 0.05); }
        } catch(err) { console.error('Synth error:', err); }
      }

      function loadCustomSample(type, file) {
        initAudio();
        if (audioCtx.state !== 'running') { audioCtx.resume().then(function() { decodeAndAssign(type, file); }); }
        else decodeAndAssign(type, file);
      }
      function decodeAndAssign(type, file) {
        var reader = new FileReader();
        reader.onload = function(e) {
          audioCtx.decodeAudioData(e.target.result, function(buffer) {
            customSamples[type] = { buffer: buffer, name: file.name };
            updateSampleUI(type, file.name);
            setStatus('✅ Сэмпл ' + type + ' загружен: ' + file.name, 'text-green-400');
          }, function() { setStatus('❌ Ошибка декодирования', 'text-red-400'); });
        };
        reader.onerror = function() { setStatus('❌ Ошибка чтения файла', 'text-red-400'); };
        reader.readAsArrayBuffer(file);
      }
      function clearCustomSample(type) { customSamples[type] = null; updateSampleUI(type, null); setStatus('🗑 Сэмпл ' + type + ' очищен', 'text-white/50'); }
      function updateSampleUI(type, fileName) {
        var s = document.getElementById('sample-status-' + type), c = document.getElementById('clear-btn-' + type);
        if (!s || !c) return;
        s.innerHTML = fileName ? '📁 <span class="text-white/80">' + fileName + '</span>' : '🔊 Синтез';
        fileName ? c.classList.remove('hidden') : c.classList.add('hidden');
      }

      function playPreview(type) { initAudio(); setTimeout(function() { if (audioCtx && audioCtx.state === 'running') playNote(type, audioCtx.currentTime + 0.02, 1); }, 100); }

      function parseTab(text) {
        if (!text || !text.trim()) return [];
        var cleaned = text.replace(/[\\\/]/g, '').trim();
        var result = [], regex = /(\([A-ZtkB-]+\))|([A-ZtkB-])(\d*\.?\d+)?/g, match;
        while ((match = regex.exec(cleaned)) !== null) {
          if (match[1]) {
            var chars = match[1].slice(1, -1).split('').filter(function(c) { return NOTE_DEFS[c] || c === '-'; });
            if (chars.length > 0) result.push({ notes: chars, duration: 1 });
          } else if (match[2]) {
            var t = match[2]; var dur = match[3] ? parseFloat(match[3]) : 1;
            result.push({ notes: [t], duration: Math.max(0.1, isNaN(dur) ? 1 : dur) });
          }
        }
        return result;
      }

      function mergeAllTracks() {
        readTrackTabsFromDOM();
        var anySolo = tracks.some(function(t) { return t.solo; });
        var activeTracks = tracks.filter(function(t) {
          if (anySolo) return t.solo && !t.muted;
          return !t.muted;
        });
        var allEvents = [];
        activeTracks.forEach(function(track) {
          var parsed = parseTab(track.tab);
          var currentTime = 0;
          parsed.forEach(function(noteObj) {
            var beatDuration = (60.0 / bpm) * noteObj.duration;
            allEvents.push({
              time: currentTime,
              notes: noteObj.notes,
              duration: noteObj.duration,
              beatDuration: beatDuration,
              trackId: track.id,
              trackName: track.name,
              trackVolume: track.volume,
              trackColor: getTrackColor(track.id),
              isRest: noteObj.notes.length === 1 && noteObj.notes[0] === '-'
            });
            currentTime += beatDuration;
          });
        });
        allEvents.sort(function(a, b) { return a.time - b.time; });
        return allEvents;
      }

      function scheduleEvent(event, time) {
        if (!event.isRest) {
          for (var i = 0; i < event.notes.length; i++) {
            if (NOTE_DEFS[event.notes[i]]) playNote(event.notes[i], time, event.trackVolume);
          }
        }
        var idx = currentIdx;
        var delayMs = Math.max(0, (time - audioCtx.currentTime) * 1000);
        setTimeout(function() { if (!isPlaying) return; updateVisualPill(idx); }, delayMs);
      }

      function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + SCHEDULE_AHEAD_S) {
          if (currentIdx >= notes.length) { stopPlayback(); return; }
          scheduleEvent(notes[currentIdx], nextNoteTime);
          var currentEvt = notes[currentIdx];
          nextNoteTime = currentEvt.time + currentEvt.beatDuration;
          currentIdx++;
        }
        schedulerTimer = setTimeout(scheduler, LOOKAHEAD_MS);
      }

      function startPlayback() {
        if (isPlaying) return;
        initAudio();
        if (!audioCtx) { setTimeout(startPlayback, 200); return; }
        if (audioCtx.state !== 'running') { audioCtx.resume().then(startPlayback); return; }
        notes = mergeAllTracks();
        if (notes.length === 0) { setStatus('⚠️ Введите корректную табулатуру', 'text-yellow-300'); return; }
        isPlaying = true; currentIdx = 0;
        nextNoteTime = audioCtx.currentTime + 0.1;
        els.playBtn.classList.add('pulse-ring'); els.stopBtn.classList.remove('opacity-50', 'pointer-events-none');
        els.playText.textContent = 'Играет...'; els.playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        buildPreview(); scheduler(); setStatus('▶ Воспроизведение...', 'text-blue-300');
      }

      function stopPlayback() {
        isPlaying = false; if (schedulerTimer) clearTimeout(schedulerTimer); schedulerTimer = null;
        els.playBtn.classList.remove('pulse-ring'); els.stopBtn.classList.add('opacity-50', 'pointer-events-none');
        els.playText.textContent = 'Старт'; els.playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
        clearActivePills(); setStatus('Готово', 'text-white/60'); updateNoteInfo();
      }

      function updateVisualPill(idx) {
        clearActivePills();
        var pills = els.noteDisplay.querySelectorAll('.note-pill[data-idx="' + idx + '"]');
        pills.forEach(function(p) { p.classList.add('active'); activePills.push(p); });
      }
      function clearActivePills() { activePills.forEach(function(p) { p.classList.remove('active'); }); activePills = []; }
      
      function drawVisualizer() {
        if (!analyser) return;
        function frame() {
          requestAnimationFrame(frame); if (!analyser) return;
          var bufLen = analyser.frequencyBinCount; var dataArray = new Uint8Array(bufLen);
          analyser.getByteFrequencyData(dataArray); var w = els.canvas.width, h = els.canvas.height;
          if (w === 0 || h === 0) return; ctx2d.clearRect(0, 0, w, h);
          var barCount = 32, barW = w / barCount, step = Math.floor(bufLen / barCount);
          for (var i = 0; i < barCount; i++) {

          }
        } frame();
      }

      function getNoteClass(type) { return NOTE_DEFS[type] ? NOTE_DEFS[type].css : 'r'; }
      function buildPreview() {

      function updateNoteInfo() { var n = notes.length; var tb = notes.reduce(function(s,x){return s+(x.duration||1);},0); els.noteCount.textContent = 'Нот: ' + n + ' | Длительность: ' + ((tb/bpm)*60).toFixed(1) + 'с'; }

      function buildSettingsUI() {

          params.forEach(function(p) {
            var val = cfg[p.id];
            h += '<div class="flex flex-col gap-1"><label class="text-xs text-white/60 flex justify-between"><span>' + p.label + '</span>';
            h += '<span class="font-mono text-white/80 val-display" id="val-' + key + '-' + p.id + '">' + val + p.unit + '</span></label>';
            h += '<input type="range" min="' + p.min + '" max="' + p.max + '" step="' + p.step + '" value="' + val + '" data-sound="' + key + '" data-param="' + p.id + '" class="w-full cursor-pointer"></div>';
          });
          var hasSample = !!customSamples[key];
          h += '<div class="mt-2 pt-2 border-t border-white/10 flex items-center justify-between">';
          h += '<div id="sample-status-' + key + '" class="text-xs text-white/50 w-full truncate">';
          h += hasSample ? '📁 <span class="text-white/80">' + customSamples[key].name + '</span>' : '🔊 Синтез';
          h += '</div><div class="flex gap-1 shrink-0">';
          h += '<button class="glass-btn px-2 py-1 rounded text-xs text-blue-200 load-sample-btn" data-type="' + key + '">📁 Файл</button>';
          h += '<button id="clear-btn-' + key + '" class="glass-btn px-2 py-1 rounded text-xs text-red-200/70 ' + (hasSample ? '' : 'hidden') + '">✕</button>';
          h += '<input type="file" accept="audio/*" class="hidden" id="file-' + key + '" data-type="' + key + '">';
          h += '</div></div>';
          div.innerHTML = h; grid.appendChild(div);
        }
        grid.querySelectorAll('input[type="range"]').forEach(function(inp) {
          inp.addEventListener('input', function(e) {
            var s = e.target.dataset.sound, p = e.target.dataset.param, v = parseFloat(e.target.value);
            if (synthConfig[s] && synthConfig[s][p] !== undefined) {
              synthConfig[s][p] = v; var pm = params.find(function(x){return x.id === p;});
              var display = document.getElementById('val-' + s + '-' + p);
              if (display) display.textContent = v + (pm ? pm.unit : '');
            }
          });
        });
        grid.querySelectorAll('.preview-btn').forEach(function(btn) { btn.addEventListener('click', function(e) { playPreview(e.target.dataset.type); }); });
        grid.querySelectorAll('.reset-btn').forEach(function(btn) {
          btn.addEventListener('click', function(e) {
            var t = e.target.dataset.type; var defaults = defaultSynthConfig();
            if (defaults[t]) { synthConfig[t] = deepCopy(defaults[t]); buildSettingsUI(); }
          });
        });
        grid.querySelectorAll('.load-sample-btn').forEach(function(btn) {
          btn.addEventListener('click', function(e) { var fi = document.getElementById('file-' + e.target.dataset.type); if (fi) fi.click(); });
        });
        grid.querySelectorAll('input[type="file"]').forEach(function(inp) {
          inp.addEventListener('change', function(e) { if (e.target.files[0]) loadCustomSample(e.target.dataset.type, e.target.files[0]); e.target.value = ''; });
        });
        grid.querySelectorAll('[id^="clear-btn-"]').forEach(function(btn) {
          btn.addEventListener('click', function(e) { clearCustomSample(e.target.id.replace('clear-btn-', '')); });
        });
      }

      function openModal(modal, panel) {
        buildSettingsUI(); modal.classList.remove('modal-hidden'); modal.classList.add('modal-visible');
        requestAnimationFrame(function() { requestAnimationFrame(function() { panel.classList.remove('modal-panel-hidden'); panel.classList.add('modal-panel-visible'); }); });
      }
      function closeModal(modal, panel) {
        panel.classList.remove('modal-panel-visible'); panel.classList.add('modal-panel-hidden');
        setTimeout(function() { modal.classList.remove('modal-visible'); modal.classList.add('modal-hidden'); }, 300);
      }

      els.openSettings.addEventListener('click', function() { openModal(els.settingsModal, els.settingsPanel); });
      els.closeSettings.addEventListener('click', function() { closeModal(els.settingsModal, els.settingsPanel); });
      els.settingsModal.addEventListener('click', function(e) { if (e.target === els.settingsModal) closeModal(els.settingsModal, els.settingsPanel); });
      els.saveSettings.addEventListener('click', function() {
        if (saveSynthConfig()) {
          saveSamplesToStorage();
          setStatus('✅ Настройки и сэмплы сохранены', 'text-green-400');
          setTimeout(function(){closeModal(els.settingsModal, els.settingsPanel);}, 400);
        } else setStatus('❌ Ошибка сохранения', 'text-red-400');
      });
      els.resetAllSettings.addEventListener('click', function() { synthConfig = defaultSynthConfig(); customSamples = {}; buildSettingsUI(); });

      els.reverbMix.addEventListener('input', function(e) {
        reverbAmount = parseFloat(e.target.value); els.reverbVal.textContent = Math.round(reverbAmount * 100) + '%';
        if (dryGain) dryGain.gain.value = 1.0 - reverbAmount; if (reverbGain) reverbGain.gain.value = reverbAmount;
      });
      els.toneControl.addEventListener('input', function(e) {
        toneFreq = parseInt(e.target.value); els.toneVal.textContent = (toneFreq >= 1000 ? (toneFreq/1000) + 'kHz' : toneFreq + 'Hz');
        if (toneFilter) toneFilter.frequency.value = toneFreq;
      });

      function getSlotKey(n) { return 'darbuka_slot_' + n; }
      function getSlotInfo(n) { try { var r = localStorage.getItem(getSlotKey(n)); return r ? JSON.parse(r) : null; } catch(e) { return null; } }
      function saveToSlot(n) {
        try {
          readTrackTabsFromDOM();
          var data = { tracks: tracks, bpm: bpm, volume: volume, ts: Date.now(), trackIdCounter: trackIdCounter };
          localStorage.setItem(getSlotKey(n), JSON.stringify(data));
          return true;
        } catch(e) { return false; }
      }
      function loadFromSlot(n) {
        var d = getSlotInfo(n); if (!d) return false;
        if (d.tracks && d.tracks.length > 0) {
          tracks = d.tracks; trackIdCounter = d.trackIdCounter || tracks.length;
        }
        bpm=d.bpm||120; els.bpm.value=bpm;
        volume=d.volume!==undefined?d.volume:0.8; els.volume.value=volume;
        els.volumeVal.textContent=Math.round(volume*100)+'%';
        renderTracks(); updateNoteInfoForText(); return true;
      }
      function deleteSlot(n) { try { localStorage.removeItem(getSlotKey(n)); return true; } catch(e) { return false; } }

      function buildSlotsUI() {
        var grid = els.slotsGrid; grid.innerHTML = ''; selectedSlotInModal = 0;
        els.selectSlotBtn.classList.add('opacity-50', 'pointer-events-none');
        els.loadSelectedSlot.classList.add('opacity-50', 'pointer-events-none');
        els.deleteSlotBtn.classList.add('opacity-50', 'pointer-events-none');
        for (var i = 1; i <= NUM_SLOTS; i++) {
          var info = getSlotInfo(i); var card = document.createElement('div');
          card.className = 'slot-card glass rounded-xl p-3 cursor-pointer border border-transparent'; card.dataset.slot = i;
          var hasData = info && info.tracks && info.tracks.length > 0;
          card.innerHTML = '<div class="flex items-center justify-between mb-2"><span class="text-sm font-bold text-white/80">Слот ' + i + '</span>' + (hasData ? '<span class="w-2 h-2 rounded-full bg-green-400/80"></span>' : '<span class="w-2 h-2 rounded-full bg-white/20"></span>') + '</div>';
          if (hasData) {
            var trackNames = info.tracks.map(function(t) { return t.name; }).join(', ');
            card.innerHTML += '<div class="text-xs text-white/50 font-mono truncate mb-1">' + trackNames + '</div>';
            var timeStr = info.ts ? new Date(info.ts).toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'}) : '--:--';
            card.innerHTML += '<div class="flex items-center justify-between text-xs text-white/40"><span>' + info.tracks.length + ' дор.</span><span>' + timeStr + '</span></div>';
          } else card.innerHTML += '<div class="text-xs text-white/30 text-center py-2">Пусто</div>';
          if (i === currentSlot) card.classList.add('active'); if (!hasData) card.classList.add('empty');
          (function(slotNum) { card.addEventListener('click', function() { selectSlotInModal(slotNum); }); })(i);
          grid.appendChild(card);
        }
      }
      function selectSlotInModal(n) {
        selectedSlotInModal = n; els.selectSlotBtn.classList.remove('opacity-50', 'pointer-events-none');
        els.deleteSlotBtn.classList.remove('opacity-50', 'pointer-events-none');
        els.loadSelectedSlot.classList.toggle('opacity-50', !getSlotInfo(n)).classList.toggle('pointer-events-none', !getSlotInfo(n));
        els.slotsGrid.querySelectorAll('.slot-card').forEach(function(c) { c.classList.toggle('active', parseInt(c.dataset.slot)===n); });
      }
      function openSlotsModal() { buildSlotsUI(); els.slotsModal.classList.remove('modal-hidden'); els.slotsModal.classList.add('modal-visible'); requestAnimationFrame(function(){requestAnimationFrame(function(){els.slotsPanel.classList.remove('modal-panel-hidden');els.slotsPanel.classList.add('modal-panel-visible');});}); }
      function closeSlotsModal() { els.slotsPanel.classList.remove('modal-panel-visible');els.slotsPanel.classList.add('modal-panel-hidden'); setTimeout(function(){els.slotsModal.classList.remove('modal-visible');els.slotsModal.classList.add('modal-hidden');},300); }
      els.openSlotsBtn.addEventListener('click', openSlotsModal);
      els.closeSlots.addEventListener('click', closeSlotsModal);
      els.slotsModal.addEventListener('click', function(e) { if (e.target === els.slotsModal) closeSlotsModal(); });
      els.selectSlotBtn.addEventListener('click', function() { if (selectedSlotInModal>0) { currentSlot=selectedSlotInModal; els.currentSlotBtn.textContent='Слот '+currentSlot; setStatus('📌 Слот: '+currentSlot, 'text-blue-300'); closeSlotsModal(); } });
      els.loadSelectedSlot.addEventListener('click', function() { if (selectedSlotInModal>0 && loadFromSlot(selectedSlotInModal)) setStatus('📂 Загружено из слота '+selectedSlotInModal, 'text-green-400'); else setStatus('⚠️ Слот пуст', 'text-yellow-300'); });
      els.deleteSlotBtn.addEventListener('click', function() { if (selectedSlotInModal>0 && confirm('Удалить слот '+selectedSlotInModal+'?')) { deleteSlot(selectedSlotInModal); buildSlotsUI(); setStatus('🗑 Удалено', 'text-red-300'); } });

      els.clearBtn.addEventListener('click', function() {
        readTrackTabsFromDOM();
        tracks.forEach(function(t) { t.tab = ''; });
        renderTracks(); updateNoteInfoForText(); setStatus('🗑 Очищено', 'text-white/50');
      });
      els.saveBtn.addEventListener('click', function() { if (saveToSlot(currentSlot)) setStatus('💾 Сохранено в слот ' + currentSlot, 'text-green-400'); else setStatus('❌ Ошибка', 'text-red-400'); });
      els.loadBtn.addEventListener('click', function() { if (loadFromSlot(currentSlot)) setStatus('📂 Загружено из слота ' + currentSlot, 'text-green-400'); else setStatus('⚠️ Пусто', 'text-yellow-300'); });
      els.addTrackBtn.addEventListener('click', function() { tracks.push(createTrack()); renderTracks(); });

      els.tabEditor.addEventListener('click', function() {
        els.tabEditor.classList.replace('text-white/60','text-blue-200'); els.tabEditor.classList.add('bg-white/10');
        els.tabPreview.classList.replace('text-blue-200','text-white/60'); els.tabPreview.classList.remove('bg-white/10');
        els.editorPanel.classList.remove('hidden'); els.previewPanel.classList.add('hidden');
      });
      els.tabPreview.addEventListener('click', function() {
        els.tabPreview.classList.replace('text-white/60','text-blue-200'); els.tabPreview.classList.add('bg-white/10');
        els.tabEditor.classList.replace('text-blue-200','text-white/60'); els.tabEditor.classList.remove('bg-white/10');
        els.previewPanel.classList.remove('hidden'); els.editorPanel.classList.add('hidden'); buildPreview();
      });

      els.bpm.addEventListener('change', function(e) { bpm = Math.min(300, Math.max(30, parseInt(e.target.value)||120)); e.target.value = bpm; updateNoteInfoForText(); });
      els.bpmUp.addEventListener('click', function() { bpm = Math.min(300, bpm + 5); els.bpm.value = bpm; updateNoteInfoForText(); });
      els.bpmDown.addEventListener('click', function() { bpm = Math.max(30, bpm - 5); els.bpm.value = bpm; updateNoteInfoForText(); });
      els.volume.addEventListener('input', function(e) { volume = parseFloat(e.target.value); els.volumeVal.textContent = Math.round(volume*100)+'%'; if (masterGain) masterGain.gain.value = volume; });
      els.playBtn.addEventListener('click', startPlayback);
      els.stopBtn.addEventListener('click', stopPlayback);

      loadSynthConfig(); loadSamplesFromStorage(); initTracks(); renderTracks();
      els.currentSlotBtn.textContent = 'Слот ' + currentSlot; updateNoteInfoForText();
      window.addEventListener('load', resizeCanvas);
    })();
  </script>
</body>
</html>
