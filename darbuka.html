<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0b1120">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Darbuka Tab Player</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --glass-bg: rgba(255,255,255,0.06); --glass-border: rgba(255,255,255,0.12); }
    * { box-sizing: border-box; }
    body { background: #0b1120; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; min-height: 100vh; }
    .liquid-bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(circle at 20% 30%, #1e3a8a 0%, transparent 50%), radial-gradient(circle at 80% 70%, #7c3aed 0%, transparent 45%), radial-gradient(circle at 50% 50%, #0c4a6e 0%, transparent 60%), linear-gradient(160deg, #0f172a 0%, #020617 100%); }
    .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.3; animation: drift 18s infinite cubic-bezier(0.4, 0, 0.2, 1); }
    .orb-1 { width: 450px; height: 450px; background: #3b82f6; top: -15%; left: -15%; }
    .orb-2 { width: 350px; height: 350px; background: #8b5cf6; bottom: -10%; right: -10%; animation-delay: -7s; }
    .orb-3 { width: 280px; height: 280px; background: #06b6d4; top: 50%; left: 40%; animation-delay: -13s; }
    @keyframes drift { 0%, 100% { transform: translate(0,0) scale(1) rotate(0deg); } 50% { transform: translate(40px,-35px) scale(1.08) rotate(10deg); } }
    .glass { background: var(--glass-bg); backdrop-filter: blur(24px) saturate(1.5); -webkit-backdrop-filter: blur(24px) saturate(1.5); border: 1px solid var(--glass-border); box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1); }
    .glass-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
    .glass-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%); opacity: 0; transition: opacity 0.2s; }
    .glass-btn:hover::before { opacity: 1; }
    .glass-btn:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.2); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
    .glass-btn:active { transform: translateY(0); }
    textarea { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent; caret-color: #60a5fa; }
    textarea::-webkit-scrollbar { width: 6px; } textarea::-webkit-scrollbar-track { background: transparent; } textarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    textarea:focus { outline: none; }
    .note-pill { display: inline-flex; align-items: center; justify-content: center; padding: 0.35em 0.6em; margin: 0.15em; border-radius: 0.5em; font-family: 'Courier New', monospace; font-weight: 700; font-size: 0.95em; transition: all 0.15s ease; border: 1px solid transparent; user-select: none; cursor: pointer; }
    .note-pill.active { transform: scale(1.15); box-shadow: 0 0 16px currentColor; border-color: rgba(255,255,255,0.4); }
    .note-d { background: rgba(59,130,246,0.3); color: #93c5fd; border-color: rgba(59,130,246,0.4); }
    .note-t { background: rgba(168,85,247,0.3); color: #c084fc; border-color: rgba(168,85,247,0.4); }
    .note-k { background: rgba(234,179,8,0.3); color: #facc15; border-color: rgba(234,179,8,0.4); }
    .note-s { background: rgba(239,68,68,0.3); color: #f87171; border-color: rgba(239,68,68,0.4); }
    .note-p { background: rgba(100,116,139,0.3); color: #94a3b8; border-color: rgba(100,116,139,0.4); }
    .pulse-ring { animation: pulseRing 2s infinite; }
    @keyframes pulseRing { 0% { box-shadow: 0 0 0 0 rgba(96,165,250,0.6); } 70% { box-shadow: 0 0 0 10px rgba(96,165,250,0); } 100% { box-shadow: 0 0 0 0 rgba(96,165,250,0); } }
    #visualizer { width: 100%; height: 60px; border-radius: 0.75rem; overflow: hidden; }
    .tab-preview { min-height: 48px; max-height: 160px; overflow-y: auto; }
    .modal-hidden { pointer-events: none; opacity: 0; visibility: hidden; }
    .modal-visible { pointer-events: auto; opacity: 1; visibility: visible; }
    .modal-panel-hidden { transform: scale(0.95); opacity: 0; }
    .modal-panel-visible { transform: scale(1); opacity: 1; }
    input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; cursor: pointer; }
    input[type=range]::-webkit-slider-runnable-track { background: rgba(255,255,255,0.15); border-radius: 999px; height: 6px; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; margin-top: -5px; width: 16px; height: 16px; border-radius: 50%; background: #60a5fa; border: 2px solid #fff; }
    @media (max-width: 640px) { .glass-btn { font-size: 0.85rem; padding: 0.5rem 0.75rem; } .note-pill { font-size: 0.85rem; padding: 0.25em 0.5em; } }
  </style>
</head>
<body class="text-white">
  <div class="liquid-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>

  <main class="relative z-10 w-full max-w-3xl mx-auto p-4 md:p-6">
    <header class="text-center mb-6">
      <div class="glass inline-flex items-center gap-3 px-6 py-3 rounded-2xl">
        <span class="text-3xl" role="img">🥁</span>
        <div class="text-left">
          <h1 class="text-2xl md:text-3xl font-bold tracking-tight bg-gradient-to-r from-blue-300 via-cyan-300 to-purple-300 bg-clip-text text-transparent">Darbuka Tab</h1>
          <p class="text-white/50 text-xs mt-0.5">Web Audio Synthesizer • MIDI Export • PWA</p>
        </div>
      </div>
    </header>

    <div class="glass rounded-2xl p-3 mb-4">
      <canvas id="visualizer"></canvas>
    </div>

    <div class="glass rounded-2xl p-4 mb-4">
      <div class="flex flex-wrap items-center justify-center gap-3">
        <div class="flex items-center gap-2 bg-black/20 border border-white/10 rounded-xl px-3 py-2">
          <label for="bpm" class="text-xs font-medium text-white/60 uppercase tracking-wider">BPM</label>
          <input type="number" id="bpm" value="120" min="30" max="300" step="1" class="bg-transparent w-14 text-center font-mono text-lg outline-none focus:ring-1 focus:ring-blue-400/50 rounded">
          <div class="flex flex-col gap-0.5">
            <button id="bpmUp" class="w-6 h-3 bg-white/10 rounded-t flex items-center justify-center text-xs hover:bg-white/20">▲</button>
            <button id="bpmDown" class="w-6 h-3 bg-white/10 rounded-b flex items-center justify-center text-xs hover:bg-white/20">▼</button>
          </div>
        </div>
        
        <button id="playBtn" class="glass-btn px-6 py-3 rounded-xl font-semibold text-blue-200 flex items-center gap-2 min-w-[140px] justify-center">
          <svg id="playIcon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <span id="playText">Старт</span>
        </button>
        
        <button id="stopBtn" class="glass-btn px-5 py-3 rounded-xl font-semibold text-red-200 flex items-center gap-2 opacity-50 pointer-events-none">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v12H6z"/></svg>
          Стоп
        </button>
      </div>

      <div class="mt-3 flex items-center gap-2 text-xs text-white/50">
        <span>Громкость:</span>
        <input type="range" id="volume" min="0" max="1" step="0.05" value="0.8" class="flex-1">
        <span id="volumeVal">80%</span>
        <button id="openSettings" class="ml-auto glass-btn px-3 py-1.5 rounded-lg text-xs text-white/70 border-white/20">⚙️ Звуки</button>
      </div>
    </div>

    <div class="glass rounded-2xl p-1 mb-4">
      <div class="flex gap-1 mb-3 px-2 pt-2">
        <button id="tabEditor" class="flex-1 py-2 text-sm font-medium rounded-xl bg-white/10 text-blue-200 transition-all">Редактор</button>
        <button id="tabPreview" class="flex-1 py-2 text-sm font-medium rounded-xl text-white/60 transition-all hover:text-white">Превью</button>
      </div>
      
      <div id="editorPanel" class="px-2 pb-2">
        <textarea id="tab" class="w-full h-48 md:h-56 bg-black/20 border border-white/10 rounded-xl p-4 font-mono text-base leading-relaxed resize-y focus:ring-2 focus:ring-blue-400/40 focus:border-transparent placeholder-white/20" placeholder="Введите табулатуру: D T K S D T..."></textarea>
        <div class="flex gap-2 mt-2 flex-wrap">
          <button id="saveBtn" class="glass-btn flex-1 py-2 rounded-xl text-sm font-medium text-white/70 border-white/20 min-w-[100px]">💾 Сохранить</button>
          <button id="loadBtn" class="glass-btn flex-1 py-2 rounded-xl text-sm font-medium text-white/70 border-white/20 min-w-[100px]">📂 Загрузить</button>
          <button id="clearBtn" class="glass-btn flex-1 py-2 rounded-xl text-sm font-medium text-red-200/80 border-red-500/20 min-w-[100px]">🗑 Очистить</button>
          <button id="midiBtn" class="glass-btn flex-1 py-2 rounded-xl text-sm font-medium text-yellow-200/80 border-yellow-500/30 min-w-[100px]">🎵 MIDI</button>
        </div>
      </div>

      <div id="previewPanel" class="hidden px-2 pb-2">
        <div id="noteDisplay" class="tab-preview bg-black/20 border border-white/10 rounded-xl p-4 flex flex-wrap gap-1 items-center min-h-[80px]"></div>
      </div>
    </div>

    <div class="glass rounded-2xl p-3 flex items-center justify-between">
      <div id="status" class="text-sm font-medium text-white/60 flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-green-400/60"></span>
        Готово
      </div>
      <div id="noteCount" class="text-xs text-white/40">Нот: 0 | Длительность: 0с</div>
    </div>

    <footer class="mt-4 text-center space-y-2">
      <div class="flex flex-wrap justify-center gap-2 text-xs">
        <span class="note-pill note-d">D</span><span class="text-white/40">= Dum</span>
        <span class="note-pill note-t">T</span><span class="text-white/40">= Tak</span>
        <span class="note-pill note-k">K</span><span class="text-white/40">= Ka</span>
        <span class="note-pill note-s">S</span><span class="text-white/40">= Slap</span>
        <span class="note-pill note-p">.</span><span class="text-white/40">= Пауза</span>
      </div>
      <p class="text-white/30 text-xs">Цифра после символа задаёт длительность в долях (например: <code class="bg-white/10 px-1 rounded">D2</code> = 2 доли). Пробелы/переносы игнорируются. <code class="bg-white/10 px-1 rounded">(DT)</code> = аккорд.</p>
    </footer>
  </main>

  <div id="settingsModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm transition-all duration-300 modal-hidden">
    <div id="settingsPanel" class="glass w-full max-w-3xl rounded-3xl p-6 relative transform transition-all duration-300 modal-panel-hidden">
      <button id="closeSettings" class="absolute top-4 right-4 text-white/60 hover:text-white transition-colors z-10">✕</button>
      <h2 class="text-xl font-bold mb-4 bg-gradient-to-r from-blue-300 to-purple-300 bg-clip-text text-transparent">Настройка синтеза</h2>
      <div id="settingsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 max-h-[50vh] overflow-y-auto pr-2"></div>
      <div class="flex justify-end gap-3 border-t border-white/10 pt-4">
        <button id="resetAllSettings" class="glass-btn px-4 py-2 rounded-xl text-sm text-white/70">Сбросить всё</button>
        <button id="saveSettings" class="glass-btn px-4 py-2 rounded-xl text-sm text-blue-200">Применить</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      // --- PWA Manifest ---
      try {
        const manifest = { name: "Darbuka Tab Player", short_name: "Darbuka", start_url: ".", display: "standalone", background_color: "#0b1120", theme_color: "#0b1120" };
        const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const link = document.createElement('link'); link.rel = 'manifest'; link.href = URL.createObjectURL(blob);
        document.head.appendChild(link);
      } catch(e) {}

      // --- DOM ---
      const els = {
        bpm: document.getElementById('bpm'), bpmUp: document.getElementById('bpmUp'), bpmDown: document.getElementById('bpmDown'),
        volume: document.getElementById('volume'), volumeVal: document.getElementById('volumeVal'),
        playBtn: document.getElementById('playBtn'), playIcon: document.getElementById('playIcon'), playText: document.getElementById('playText'),
        stopBtn: document.getElementById('stopBtn'), openSettings: document.getElementById('openSettings'),
        saveBtn: document.getElementById('saveBtn'), loadBtn: document.getElementById('loadBtn'), clearBtn: document.getElementById('clearBtn'), midiBtn: document.getElementById('midiBtn'),
        tab: document.getElementById('tab'), tabEditor: document.getElementById('tabEditor'), tabPreview: document.getElementById('tabPreview'),
        editorPanel: document.getElementById('editorPanel'), previewPanel: document.getElementById('previewPanel'),
        noteDisplay: document.getElementById('noteDisplay'), status: document.getElementById('status'), noteCount: document.getElementById('noteCount'),
        canvas: document.getElementById('visualizer'),
        settingsModal: document.getElementById('settingsModal'), settingsPanel: document.getElementById('settingsPanel'),
        closeSettings: document.getElementById('closeSettings'), settingsGrid: document.getElementById('settingsGrid'),
        saveSettings: document.getElementById('saveSettings'), resetAllSettings: document.getElementById('resetAllSettings')
      };

      const ctx2d = els.canvas.getContext('2d');
      const resizeCanvas = () => { const r = els.canvas.getBoundingClientRect(); if (r.width > 0 && r.height > 0) { els.canvas.width = r.width; els.canvas.height = r.height; } };
      resizeCanvas(); window.addEventListener('resize', resizeCanvas);

      // --- Audio State ---
      let audioCtx = null, masterGain = null, analyser = null, schedulerTimer = null;
      let isPlaying = false, nextNoteTime = 0.0, currentIdx = 0;
      let notes = [], bpm = 120, volume = 0.8;
      let activePills = [];
      const LOOKAHEAD_MS = 25.0, SCHEDULE_AHEAD_S = 0.1;

      // --- Synth Configuration ---
      const DEFAULT_SYNTH = {
        D: { freq: 82, decay: 0.45, noise: 0.03, q: 1.2, midi: 35, label: 'Dum' },
        T: { freq: 260, decay: 0.15, noise: 0.08, q: 2.5, midi: 38, label: 'Tak' },
        K: { freq: 15, decay: 0.06, noise: 0.85, q: 0.8, midi: 39, label: 'Ka' },
        S: { freq: 180, decay: 0.20, noise: 0.25, q: 3.0, midi: 40, label: 'Slap' }
      };

      let synthConfig = {};
      let settingsInitialized = false;

      function deepCopy(obj) { return JSON.parse(JSON.stringify(obj)); }

      // Load synth settings from localStorage
      function loadSynthConfig() {
        try {
          const saved = localStorage.getItem('darbuka_synth_v3');
          if (saved) {
            const parsed = JSON.parse(saved);
            for (const k in DEFAULT_SYNTH) {
              synthConfig[k] = {...DEFAULT_SYNTH[k]};
              if (parsed[k]) {
                for (const p in DEFAULT_SYNTH[k]) {
                  if (parsed[k][p] !== undefined && parsed[k][p] !== null) {
                    synthConfig[k][p] = parsed[k][p];
                  }
                }
              }
            }
          } else {
            synthConfig = deepCopy(DEFAULT_SYNTH);
          }
        } catch(e) {
          synthConfig = deepCopy(DEFAULT_SYNTH);
        }
      }

      // Save synth settings to localStorage
      function saveSynthConfig() {
        try {
          localStorage.setItem('darbuka_synth_v3', JSON.stringify(synthConfig));
          return true;
        } catch(e) {
          console.error('Failed to save synth config:', e);
          return false;
        }
      }

      // --- Audio Init ---
      function initAudio() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume().then(() => {
            if (!masterGain) {
              setupAudioNodes();
            }
          });
        } else {
          if (!masterGain) {
            setupAudioNodes();
          }
        }
      }

      function setupAudioNodes() {
        if (!masterGain) {
          masterGain = audioCtx.createGain();
          masterGain.gain.value = volume;
          analyser = audioCtx.createAnalyser();
          analyser.fftSize = 256;
          analyser.smoothingTimeConstant = 0.85;
          masterGain.connect(analyser);
          analyser.connect(audioCtx.destination);
          drawVisualizer();
        }
      }

      function playNote(type, time) {
        if (!audioCtx || !masterGain) return;
        const cfg = synthConfig[type];
        if (!cfg) return;
        
        try {
          const osc = audioCtx.createOscillator();
          osc.type = 'sine';
          const baseFreq = Math.max(20, cfg.freq);
          osc.frequency.setValueAtTime(baseFreq, time);
          const targetFreq = Math.max(20, baseFreq * 0.88);
          osc.frequency.exponentialRampToValueAtTime(targetFreq, time + Math.max(0.01, cfg.decay));
          
          const noiseLen = Math.max(0.02, cfg.decay * 0.7);
          const bufSize = Math.ceil(audioCtx.sampleRate * noiseLen);
          const nBuf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
          const d = nBuf.getChannelData(0);
          for(let i=0; i<bufSize; i++) d[i] = Math.random()*2-1;
          const noise = audioCtx.createBufferSource();
          noise.buffer = nBuf;
          
          const oscGain = audioCtx.createGain();
          oscGain.gain.setValueAtTime(Math.max(0, 1 - cfg.noise * 0.6), time);
          oscGain.gain.exponentialRampToValueAtTime(0.001, time + Math.max(0.01, cfg.decay));
          
          const noiseGain = audioCtx.createGain();
          noiseGain.gain.setValueAtTime(Math.min(1, cfg.noise), time);
          noiseGain.gain.exponentialRampToValueAtTime(0.001, time + Math.max(0.01, noiseLen));
          
          const filt = audioCtx.createBiquadFilter();
          filt.type = cfg.noise > 0.4 ? 'bandpass' : 'lowpass';
          filt.frequency.value = baseFreq > 50 ? baseFreq * 3.2 : 800;
          filt.Q.value = Math.max(0.1, cfg.q);
          
          osc.connect(oscGain);
          oscGain.connect(filt);
          noise.connect(noiseGain);
          noiseGain.connect(filt);
          filt.connect(masterGain);
          
          osc.start(time);
          osc.stop(time + cfg.decay + 0.05);
          noise.start(time);
          noise.stop(time + noiseLen + 0.05);
        } catch(err) {
          console.error('Ошибка синтеза:', err);
        }
      }

      function playPreview(type) {
        initAudio();
        setTimeout(() => {
          if (audioCtx && audioCtx.state === 'running') {
            playNote(type, audioCtx.currentTime + 0.02);
          }
        }, 100);
      }

      // --- Parser ---
      function parseTab(text) {
        if (!text || !text.trim()) return [];
        const cleaned = text.replace(/[\\\/]/g, '').trim();
        const result = [];
        const regex = /(\([A-Z.]+\))|([A-Z.])(\d*\.?\d+)?/g;
        let match;
        while ((match = regex.exec(cleaned)) !== null) {
          if (match[1]) {
            const chars = match[1].slice(1, -1).split('').filter(c => DEFAULT_SYNTH[c] || c === '.');
            if (chars.length > 0) result.push({ notes: chars, duration: 1 });
          } else if (match[2]) {
            const t = match[2];
            const dur = match[3] ? parseFloat(match[3]) : 1;
            result.push({ notes: [t], duration: Math.max(0.1, isNaN(dur) ? 1 : dur) });
          }
        }
        return result;
      }

      // --- Sequencer ---
      function scheduleEvent(noteObj, time) {
        for (const n of noteObj.notes) { if (DEFAULT_SYNTH[n]) playNote(n, time); }
        const idx = currentIdx;
        const delayMs = Math.max(0, (time - audioCtx.currentTime) * 1000);
        setTimeout(() => { if (!isPlaying) return; updateVisualPill(idx); }, delayMs);
      }

      function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + SCHEDULE_AHEAD_S) {
          if (currentIdx >= notes.length) { stopPlayback(); return; }
          scheduleEvent(notes[currentIdx], nextNoteTime);
          nextNoteTime += (60.0 / bpm) * notes[currentIdx].duration;
          currentIdx++;
        }
        schedulerTimer = setTimeout(scheduler, LOOKAHEAD_MS);
      }

      function startPlayback() {
        if (isPlaying) return;
        initAudio();
        
        if (!audioCtx) { setTimeout(() => startPlayback(), 200); return; }
        if (audioCtx.state !== 'running') {
          audioCtx.resume().then(() => startPlayback());
          return;
        }
        
        notes = parseTab(els.tab.value);
        if (notes.length === 0) { setStatus('⚠️ Введите корректную табулатуру', 'text-yellow-300'); return; }
        
        isPlaying = true; currentIdx = 0;
        nextNoteTime = audioCtx.currentTime + 0.1;
        els.playBtn.classList.add('pulse-ring');
        els.stopBtn.classList.remove('opacity-50', 'pointer-events-none');
        els.playText.textContent = 'Играет...';
        els.playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        buildPreview();
        scheduler();
        setStatus('▶ Воспроизведение...', 'text-blue-300');
      }

      function stopPlayback() {
        isPlaying = false;
        if (schedulerTimer) clearTimeout(schedulerTimer);
        schedulerTimer = null;
        els.playBtn.classList.remove('pulse-ring');
        els.stopBtn.classList.add('opacity-50', 'pointer-events-none');
        els.playText.textContent = 'Старт';
        els.playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
        clearActivePills();
        setStatus('Готово', 'text-white/60');
        updateNoteInfo();
      }

      // --- Visuals ---
      function updateVisualPill(idx) {
        clearActivePills();
        const pills = els.noteDisplay.querySelectorAll('.note-pill[data-idx="' + idx + '"]');
        pills.forEach(p => { p.classList.add('active'); activePills.push(p); });
      }
      function clearActivePills() { activePills.forEach(p => p.classList.remove('active')); activePills = []; }
      
      function drawVisualizer() {
        if (!analyser) return;
        const frame = () => {
          requestAnimationFrame(frame);
          if (!analyser) return;
          const bufLen = analyser.frequencyBinCount;
          const dataArray = new Uint8Array(bufLen);
          analyser.getByteFrequencyData(dataArray);
          const w = els.canvas.width, h = els.canvas.height;
          if (w === 0 || h === 0) return;
          ctx2d.clearRect(0, 0, w, h);
          const barCount = 32, barW = w / barCount, step = Math.floor(bufLen / barCount);
          for (let i = 0; i < barCount; i++) {
            const val = dataArray[i * step] / 255, barH = Math.max(1, val * h * 0.85);
            const grad = ctx2d.createLinearGradient(0, h, 0, h - barH);
            grad.addColorStop(0, 'rgba(59,130,246,0.8)'); grad.addColorStop(1, 'rgba(168,85,247,0.9)');
            ctx2d.fillStyle = grad;
            const x = i * barW + 1;
            ctx2d.beginPath(); ctx2d.roundRect(x, h - barH, barW - 2, barH, 2); ctx2d.fill();
          }
        };
        frame();
      }

      function buildPreview() {
        els.noteDisplay.innerHTML = '';
        notes.forEach((n, i) => {
          if (n.notes.length === 1) {
            const type = n.notes[0];
            const el = document.createElement('span');
            if (type === '.') { el.className = 'note-pill note-p'; el.textContent = '·' + (n.duration > 1 ? n.duration : ''); }
            else { el.className = 'note-pill note-' + type.toLowerCase(); el.textContent = type + (n.duration > 1 ? n.duration : ''); }
            el.dataset.idx = i; els.noteDisplay.appendChild(el);
          } else {
            const wrap = document.createElement('span');
            wrap.className = 'inline-flex items-center bg-white/5 border border-white/10 rounded-lg px-1 py-0.5 gap-1';
            n.notes.forEach(type => { const e = document.createElement('span'); e.className = 'note-pill note-' + type.toLowerCase(); e.dataset.idx = i; e.textContent = type; wrap.appendChild(e); });
            if (n.duration > 1) { const d = document.createElement('span'); d.className = 'text-xs text-white/50 ml-1'; d.dataset.idx = i; d.textContent = n.duration; wrap.appendChild(d); }
            els.noteDisplay.appendChild(wrap);
          }
        });
      }

      function setStatus(msg, color) { els.status.innerHTML = '<span class="w-2 h-2 rounded-full bg-current"></span> ' + msg; els.status.className = 'text-sm font-medium flex items-center gap-2 ' + (color || 'text-white/60'); }
      function updateNoteInfo() { const n = notes.length; let tb = notes.reduce((s,x)=>s+x.duration,0); els.noteCount.textContent = 'Нот: ' + n + ' | Длительность: ' + ((tb/bpm)*60).toFixed(1) + 'с'; }
      function updateNoteInfoForText() { const p = parseTab(els.tab.value); const n = p.length; let tb = p.reduce((s,x)=>s+x.duration,0); els.noteCount.textContent = 'Нот: ' + n + ' | Длительность: ' + ((tb/bpm)*60).toFixed(1) + 'с'; }

      // --- Settings UI ---
      function buildSettingsUI() {
        const grid = els.settingsGrid;
        grid.innerHTML = '';
        
        const params = [
          { id: 'freq', label: 'Частота (Hz)', min: 30, max: 400, step: 1, unit: 'Hz' },
          { id: 'decay', label: 'Затухание (с)', min: 0.02, max: 1.5, step: 0.01, unit: 'с' },
          { id: 'noise', label: 'Шум/Хлопок', min: 0, max: 1, step: 0.01, unit: '' },
          { id: 'q', label: 'Резонанс', min: 0.5, max: 10, step: 0.1, unit: '' }
        ];
        
        for (const [key, cfg] of Object.entries(synthConfig)) {
          const def = DEFAULT_SYNTH[key];
          const div = document.createElement('div');
          div.className = 'glass rounded-2xl p-4 space-y-3';
          div.innerHTML = `
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-2">
                <span class="note-pill note-${key.toLowerCase()}">${key}</span>
                <span class="text-sm text-white/60">${def.label}</span>
              </div>
              <div class="flex gap-1">
                <button class="glass-btn px-2 py-1 rounded text-xs text-blue-200 preview-btn" data-type="${key}">🔊 Слушать</button>
                <button class="glass-btn px-2 py-1 rounded text-xs text-white/60 reset-btn" data-type="${key}">↺</button>
              </div>
            </div>
            ${params.map(p => {
              const val = cfg[p.id];
              return `<div class="flex flex-col gap-1">
                <label class="text-xs text-white/60 flex justify-between"><span>${p.label}</span><span class="font-mono text-white/80 val-display" id="val-${key}-${p.id}">${val}${p.unit}</span></label>
                <input type="range" min="${p.min}" max="${p.max}" step="${p.step}" value="${val}" data-sound="${key}" data-param="${p.id}" class="w-full cursor-pointer">
              </div>`;
            }).join('')}
          `;
          grid.appendChild(div);
        }

        // Attach event listeners using regular functions to preserve `this` context
        grid.querySelectorAll('input[type="range"]').forEach(function(inp) {
          inp.addEventListener('input', function(e) {
            const s = e.target.dataset.sound, p = e.target.dataset.param;
            const v = parseFloat(e.target.value);
            if (synthConfig[s] && synthConfig[s][p] !== undefined) {
              synthConfig[s][p] = v;
              const pm = params.find(x => x.id === p);
              const display = document.getElementById('val-' + s + '-' + p);
              if (display) display.textContent = v + (pm ? pm.unit : '');
            }
          });
        });
        
        grid.querySelectorAll('.preview-btn').forEach(function(btn) {
          btn.addEventListener('click', function(e) {
            playPreview(e.target.dataset.type);
          });
        });
        
        grid.querySelectorAll('.reset-btn').forEach(function(btn) {
          btn.addEventListener('click', function(e) {
            const t = e.target.dataset.type;
            if (DEFAULT_SYNTH[t]) {
              synthConfig[t] = {...DEFAULT_SYNTH[t]};
              buildSettingsUI();
            }
          });
        });
        
        settingsInitialized = true;
      }

      function openModal() {
        settingsInitialized = false;
        buildSettingsUI();
        els.settingsModal.classList.remove('modal-hidden');
        els.settingsModal.classList.add('modal-visible');
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            els.settingsPanel.classList.remove('modal-panel-hidden');
            els.settingsPanel.classList.add('modal-panel-visible');
          });
        });
      }
      
      function closeModal() {
        els.settingsPanel.classList.remove('modal-panel-visible');
        els.settingsPanel.classList.add('modal-panel-hidden');
        setTimeout(function() {
          els.settingsModal.classList.remove('modal-visible');
          els.settingsModal.classList.add('modal-hidden');
        }, 300);
      }
      
      els.openSettings.addEventListener('click', openModal);
      els.closeSettings.addEventListener('click', closeModal);
      els.settingsModal.addEventListener('click', function(e) { if (e.target === els.settingsModal) closeModal(); });
      
      // Save settings to localStorage when "Применить" is clicked
      els.saveSettings.addEventListener('click', function() {
        const success = saveSynthConfig();
        if (success) {
          setStatus('✅ Настройки звуков сохранены в LocalStorage', 'text-green-400');
          setTimeout(closeModal, 400);
        } else {
          setStatus('❌ Ошибка сохранения настроек', 'text-red-400');
        }
      });
      
      els.resetAllSettings.addEventListener('click', function() {
        synthConfig = deepCopy(DEFAULT_SYNTH);
        buildSettingsUI();
      });

      // --- Persistence ---
      function saveData() { try { localStorage.setItem('darbuka_v3', JSON.stringify({ tab: els.tab.value, bpm, volume, ts: Date.now() })); setStatus('✅ Сохранено', 'text-green-400'); } catch(e) { setStatus('❌ Ошибка', 'text-red-400'); } }
      function loadData() { try { const raw = localStorage.getItem('darbuka_v3'); if (raw) { const d = JSON.parse(raw); els.tab.value = d.tab || ''; bpm = d.bpm || 120; els.bpm.value = bpm; volume = d.volume ?? 0.8; els.volume.value = volume; els.volumeVal.textContent = Math.round(volume*100)+'%'; updateNoteInfoForText(); setStatus('✅ Загружено', 'text-green-400'); } } catch(e) {} }

      function exportMidi() {
        const parsed = parseTab(els.tab.value);
        if (!parsed.length) return alert('Нет данных для экспорта');
        const division = 480, mpqn = Math.round(60000000 / bpm);
        let trackEvents = [], absTick = 0;
        const addEvt = function(delta, bytes) { trackEvents.push({ delta, bytes: new Uint8Array(bytes) }); };
        addEvt(0, [0xFF, 0x51, 0x03, (mpqn>>16)&0xFF, (mpqn>>8)&0xFF, mpqn&0xFF]);
        let lastAbs = 0;
        for (const n of parsed) {
          const dur = Math.round(n.duration * division);
          if (n.notes.length === 1 && n.notes[0] !== '.') {
            const note = synthConfig[n.notes[0]]?.midi || 38;
            addEvt(absTick - lastAbs, [0x99, note, 100]); lastAbs = absTick;
            addEvt(dur, [0x89, note, 0]); lastAbs = absTick + dur;
          } else if (n.notes.length > 1) {
            for (let i = 0; i < n.notes.length; i++) {
              if (DEFAULT_SYNTH[n.notes[i]]) { addEvt(absTick - lastAbs, [0x99, synthConfig[n.notes[i]].midi, 100]); lastAbs = absTick; }
            }
            const offTick = absTick + dur;
            for (let i = 0; i < n.notes.length; i++) {
              if (DEFAULT_SYNTH[n.notes[i]]) { addEvt(offTick - lastAbs, [0x89, synthConfig[n.notes[i]].midi, 0]); lastAbs = offTick; }
            }
          }
          absTick += dur;
        }
        addEvt(absTick - lastAbs, [0xFF, 0x2F, 0x00]);
        function encodeVarLen(v) { const out = []; do { out.unshift(v & 0x7F); v >>= 7; } while (v > 0); for (let i = 0; i < out.length - 1; i++) out[i] |= 0x80; return out; }
        let trackBytes = []; for (const e of trackEvents) { trackBytes.push(...encodeVarLen(e.delta)); trackBytes.push(...e.bytes); }
        const tLen = trackBytes.length;
        const midi = new Uint8Array(14 + 8 + tLen);
        let off = 0;
        midi.set([0x4D,0x54,0x68,0x64,0x00,0x00,0x00,0x06,0x00,0x00,0x00,0x01,0x00,(division>>8)&0xFF,division&0xFF], off); off+=14;
        midi.set([0x4D,0x54,0x72,0x6B, (tLen>>24)&0xFF, (tLen>>16)&0xFF, (tLen>>8)&0xFF, tLen&0xFF], off); off+=8;
        midi.set(trackBytes, off);
        const blob = new Blob([midi], {type: 'audio/midi'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'darbuka_' + Date.now() + '.mid';
        document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(a.href);
        setStatus('🎵 MIDI сохранён', 'text-yellow-300');
      }

      // --- Bindings ---
      els.bpm.addEventListener('change', function(e) { bpm = Math.min(300, Math.max(30, parseInt(e.target.value)||120)); e.target.value = bpm; updateNoteInfoForText(); });
      els.bpmUp.addEventListener('click', function() { bpm = Math.min(300, bpm + 5); els.bpm.value = bpm; updateNoteInfoForText(); });
      els.bpmDown.addEventListener('click', function() { bpm = Math.max(30, bpm - 5); els.bpm.value = bpm; updateNoteInfoForText(); });
      els.volume.addEventListener('input', function(e) { volume = parseFloat(e.target.value); els.volumeVal.textContent = Math.round(volume*100)+'%'; if (masterGain) masterGain.gain.value = volume; });
      els.playBtn.addEventListener('click', startPlayback);
      els.stopBtn.addEventListener('click', stopPlayback);
      els.saveBtn.addEventListener('click', saveData);
      els.loadBtn.addEventListener('click', loadData);
      els.clearBtn.addEventListener('click', function() { els.tab.value = ''; updateNoteInfoForText(); setStatus('🗑 Очищено', 'text-white/50'); });
      els.midiBtn.addEventListener('click', exportMidi);
      els.tab.addEventListener('input', updateNoteInfoForText);
      
      els.tabEditor.addEventListener('click', function() { els.tabEditor.classList.replace('text-white/60','text-blue-200'); els.tabEditor.classList.add('bg-white/10'); els.tabPreview.classList.replace('text-blue-200','text-white/60'); els.tabPreview.classList.remove('bg-white/10'); els.editorPanel.classList.remove('hidden'); els.previewPanel.classList.add('hidden'); });
      els.tabPreview.addEventListener('click', function() { els.tabPreview.classList.replace('text-white/60','text-blue-200'); els.tabPreview.classList.add('bg-white/10'); els.tabEditor.classList.replace('text-blue-200','text-white/60'); els.tabEditor.classList.remove('bg-white/10'); els.previewPanel.classList.remove('hidden'); els.editorPanel.classList.add('hidden'); buildPreview(); });

      // --- Init ---
      loadSynthConfig();
      loadData();
      updateNoteInfoForText();
      
      window.addEventListener('load', resizeCanvas);
    })();
  </script>
</body>
</html>
