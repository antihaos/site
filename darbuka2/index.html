<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0b1120">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Darbuka Tab Player Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="samples.js"></script>
  <script src="presets.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            glass: 'rgba(255,255,255,0.06)',
            glassBorder: 'rgba(255,255,255,0.12)',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="liquid-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="relative z-10 min-h-screen flex flex-col">
    <!-- Header -->
    <header class="glass mx-4 mt-4 mb-3 rounded-2xl p-4 flex items-center justify-between">
      <h1 class="text-xl font-bold text-white flex items-center gap-2">
        <span class="text-2xl">🥁</span>
        Darbuka Tab Pro
      </h1>
      <div class="flex items-center gap-2">
        <button id="exportBtn" class="glass-btn px-3 py-2 rounded-xl text-white text-sm" title="Экспорт проекта">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
        </button>
        <button id="importBtn" class="glass-btn px-3 py-2 rounded-xl text-white text-sm" title="Импорт проекта">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        </button>
        <input type="file" id="importFile" accept=".json" class="hidden">
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 px-4 pb-4 space-y-3">
      <!-- Visualizer -->
      <div class="glass rounded-2xl p-3">
        <canvas id="visualizer"></canvas>
      </div>

      <!-- Controls -->
      <div class="glass rounded-2xl p-4">
        <div class="controls-section">
          <!-- Play/Stop & Record -->
          <div class="controls-row-main flex items-center justify-between gap-2">
            <button id="playStopBtn" class="glass-btn flex-1 max-w-[140px] px-4 py-3 rounded-xl text-white font-bold flex items-center justify-center gap-2 pulse-ring">
              <svg class="w-5 h-5" id="playIcon" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              <svg class="w-5 h-5 hidden" id="stopIcon" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
              <span id="playStopText">Play</span>
            </button>
            
            <button id="recordBtn" class="glass-btn w-14 h-14 rounded-full text-white font-bold flex items-center justify-center">
              <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>
            </button>

            <!-- BPM Control -->
            <div class="control-group">
              <span class="control-label">BPM</span>
              <input type="number" id="bpmInput" value="120" min="30" max="300" class="w-16 bg-transparent text-white text-center font-bold text-lg outline-none">
              <input type="range" id="bpmSlider" value="120" min="30" max="300" class="w-20">
            </div>
          </div>

          <!-- Sliders Row -->
          <div class="controls-row-sliders grid grid-cols-[1fr_auto_1fr] gap-3 items-center">
            <!-- Swing & Beat Division -->
            <div class="control-group flex-1">
              <span class="control-label">Swing</span>
              <input type="range" id="swingSlider" value="0" min="0" max="0.5" step="0.01" class="flex-1">
              <span id="swingValue" class="text-white text-xs font-mono w-10 text-right">0%</span>
            </div>

            <!-- Metronome -->
            <button id="metroBtn" class="glass-btn w-12 h-12 rounded-xl text-white flex items-center justify-center">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </button>

            <!-- Volume -->
            <div class="control-group flex-1">
              <span class="control-label">Vol</span>
              <input type="range" id="volumeSlider" value="80" min="0" max="100" class="flex-1">
              <span id="volumeValue" class="text-white text-xs font-mono w-10 text-right">80%</span>
            </div>
          </div>

          <!-- Beat Division & EQ -->
          <div class="controls-row-beat-eq flex items-center justify-between gap-2">
            <div class="control-group flex-1">
              <span class="control-label">Beat</span>
              <div class="flex gap-1">
                <button class="beat-val-btn glass-btn flex-1 px-2 py-2 rounded-lg text-white text-xs font-bold" data-beat="0.25">1/4</button>
                <button class="beat-val-btn glass-btn flex-1 px-2 py-2 rounded-lg text-white text-xs font-bold active" data-beat="0.5">1/8</button>
                <button class="beat-val-btn glass-btn flex-1 px-2 py-2 rounded-lg text-white text-xs font-bold" data-beat="1">1/16</button>
              </div>
            </div>

            <button id="eqBtn" class="glass-btn w-12 h-12 rounded-xl text-white flex items-center justify-center">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Slots -->
      <div class="glass rounded-2xl p-4">
        <h3 class="text-white text-sm font-bold mb-3 flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
          Слоты семплов
        </h3>
        <div id="slotsContainer" class="grid grid-cols-4 sm:grid-cols-8 gap-2">
          <!-- Slots will be generated by JS -->
        </div>
      </div>

      <!-- Tracks -->
      <div class="glass rounded-2xl p-4">
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-white text-sm font-bold flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/></svg>
            Треки
          </h3>
          <button id="addTrackBtn" class="glass-btn px-3 py-2 rounded-xl text-white text-xs font-bold flex items-center gap-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Добавить
          </button>
        </div>
        <div id="tracksContainer" class="space-y-2">
          <!-- Tracks will be generated by JS -->
        </div>
      </div>

      <!-- Presets -->
      <div class="glass rounded-2xl p-4">
        <h3 class="text-white text-sm font-bold mb-3 flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
          Пресеты ритмов
        </h3>
        <div id="presetsContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2">
          <!-- Presets will be generated by JS -->
        </div>
      </div>
    </main>
  </div>

  <!-- Sequencer Modal -->
  <div id="sequencerModal" class="modal-hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4 bg-black/60 backdrop-blur-sm transition-all duration-300">
    <div class="modal-panel-hidden glass rounded-2xl w-full max-w-4xl max-h-[90vh] overflow-auto flex flex-col">
      <div class="p-4 border-b border-white/10 flex items-center justify-between">
        <h3 class="text-white text-lg font-bold">Секвенсор</h3>
        <button id="closeSequencerBtn" class="glass-btn w-10 h-10 rounded-xl text-white flex items-center justify-center">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="p-4 flex-1 overflow-auto">
        <div id="sequencerGrid" class="seq-grid">
          <!-- Grid will be generated by JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- EQ Modal -->
  <div id="eqModal" class="modal-hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm transition-all duration-300">
    <div class="modal-panel-hidden glass rounded-2xl w-full max-w-md p-6">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-white text-lg font-bold">Эквалайзер</h3>
        <button id="closeEqBtn" class="glass-btn w-10 h-10 rounded-xl text-white flex items-center justify-center">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="flex justify-center gap-4 mb-6">
        <div class="eq-slider-wrapper">
          <div class="eq-slider-container">
            <input type="range" id="eqLow" class="eq-vertical-range" value="0" min="-12" max="12" step="0.5">
          </div>
          <span class="text-white text-xs font-bold mt-2">Low</span>
        </div>
        <div class="eq-slider-wrapper">
          <div class="eq-slider-container">
            <input type="range" id="eqMid" class="eq-vertical-range" value="0" min="-12" max="12" step="0.5">
          </div>
          <span class="text-white text-xs font-bold mt-2">Mid</span>
        </div>
        <div class="eq-slider-wrapper">
          <div class="eq-slider-container">
            <input type="range" id="eqHigh" class="eq-vertical-range" value="0" min="-12" max="12" step="0.5">
          </div>
          <span class="text-white text-xs font-bold mt-2">High</span>
        </div>
      </div>
      <button id="resetEqBtn" class="glass-btn w-full py-3 rounded-xl text-white font-bold">Сбросить</button>
    </div>
  </div>

  <!-- Module Scripts -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
