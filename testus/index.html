    <!-- Custom Styles -->
    <style>
        /* Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }
        
        .animate-slide-in {
            animation: slideIn 0.3s ease-out;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #4F46E5;
            border-radius: 4px;
        }
        
        /* Component Styles */
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.15);
            transform: translateY(-2px);
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            outline: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
        }
        
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }
        
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        
        .input-field {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s ease;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #4F46E5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        /* Question Types */
        .option-card {
            padding: 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .option-card:hover {
            border-color: #4F46E5;
            background: #f5f3ff;
        }
        
        .option-card.selected {
            border-color: #4F46E5;
            background: #ede9fe;
        }
        
        .option-card.correct {
            border-color: #10B981;
            background: #d1fae5;
        }
        
        .option-card.incorrect {
            border-color: #EF4444;
            background: #fee2e2;
        }
        
        /* Drag and Drop */
        .draggable {
            cursor: grab;
            touch-action: none;
        }
        
        .draggable:active {
            cursor: grabbing;
        }
        
        .drop-zone {
            border: 2px dashed #e5e7eb;
            border-radius: 8px;
            min-height: 60px;
            transition: all 0.2s ease;
        }
        
        .drop-zone.active {
            border-color: #4F46E5;
            background: #f5f3ff;
        }
        
        /* Timer */
        .timer {
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
        
        .timer.warning {
            color: #F59E0B;
            animation: pulse 1s infinite;
        }
        
        .timer.danger {
            color: #EF4444;
            animation: pulse 0.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Progress Bar */
        .progress-bar {
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4F46E5 0%, #7C3AED 100%);
            transition: width 0.3s ease;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;

        .modal {
            background: white;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        /* Table Styles */
        .data-table {

        .data-table td {

        .data-table th {

            font-weight: 600;
            color: #374151;
        }
        
        .data-table tr:hover {
            background: #f9fafb;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            
            .btn {
                padding: 10px 16px;
                font-size: 14px;
            }
        }
        
        /* Print Styles */
        @media print {
            .no-print {

            .card {
                box-shadow: none;

            }
        }
    </style>

<body>
    <div id="app"></div>
    
    <!-- Application Scripts -->
    <script>
        // ============================================
        // DATA LAYER - JSON Structures & Storage
        // ============================================
        
        const DataLayer = {
            // Default data structures
            structures: {
                test: {
                    id: null,
                    title: '',
                    description: '',
                    sections: [],
                    settings: {
                        timeLimit: null,
                        passingScore: 70,
                        randomizeQuestions: false,
                        showResults: true,
                        allowReview: false
                    },
                    createdAt: null,
                    updatedAt: null
                },
                section: {
                    id: null,
                    title: '',
                    description: '',
                    questions: [],
                    weight: 1
                },
                question: {
                    id: null,
                    type: 'single', // single, multiple, fill, sequence, match, open
                    text: '',
                    options: [],
                    correctAnswers: [],
                    weight: 1,
                    explanation: ''
                },
                result: {
                    id: null,
                    testId: null,
                    userId: null,
                    answers: [],
                    score: 0,
                    maxScore: 0,
                    percentage: 0,
                    startTime: null,
                    endTime: null,
                    duration: 0,
                    questionResults: []
                }
            },
            
            // Storage keys
            keys: {
                tests: 'testus_tests',
                results: 'testus_results',
                users: 'testus_users',
                settings: 'testus_settings'
            },
            
            // Generate unique ID
            generateId() {
                return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            },
            
            // LocalStorage operations
            save(key, data) {
                try {
                    localStorage.setItem(this.keys[key], JSON.stringify(data));
                    return true;
                } catch (e) {
                    console.error('Save error:', e);
                    return false;
                }
            },
            
            load(key) {
                try {
                    const data = localStorage.getItem(this.keys[key]);
                    return data ? JSON.parse(data) : [];
                } catch (e) {
                    console.error('Load error:', e);
                    return [];
                }
            },
            
            // Test operations
            saveTest(test) {
                const tests = this.load('tests');
                if (!test.id) test.id = this.generateId();
                test.updatedAt = new Date().toISOString();
                
                const index = tests.findIndex(t => t.id === test.id);
                if (index >= 0) {
                    tests[index] = test;
                } else {
                    test.createdAt = new Date().toISOString();
                    tests.push(test);
                }
                
                this.save('tests', tests);
                return test;
            },
            
            getTest(id) {
                const tests = this.load('tests');
                return tests.find(t => t.id === id);
            },
            
            deleteTest(id) {
                const tests = this.load('tests');
                const filtered = tests.filter(t => t.id !== id);
                this.save('tests', filtered);
                
                // Also delete associated results
                const results = this.load('results');
                const filteredResults = results.filter(r => r.testId !== id);
                this.save('results', filteredResults);
            },
            
            getAllTests() {
                return this.load('tests');
            },
            
            // Result operations
            saveResult(result) {
                const results = this.load('results');
                if (!result.id) result.id = this.generateId();
                results.push(result);
                this.save('results', results);
                return result;
            },
            
            getResults(testId = null) {
                const results = this.load('results');
                if (testId) {
                    return results.filter(r => r.testId === testId);
                }
                return results;
            },
            
            exportResults(testId) {
                const results = this.getResults(testId);
                const test = this.getTest(testId);
                
                if (!test) return '';
                
                // Create CSV
                let csv = 'ID;Дата начала;Дата окончания;Продолжительность (сек);Баллы;Макс баллы;Процент;Статус\n';
                
                results.forEach(r => {
                    const status = r.percentage >= test.settings.passingScore ? 'Сдан' : 'Не сдан';
                    csv += `${r.id};${new Date(r.startTime).toLocaleString()};${new Date(r.endTime).toLocaleString()};${r.duration};${r.score};${r.maxScore};${r.percentage.toFixed(1)}%;${status}\n`;
                });
                
                return csv;
            }
        };
        
        // ============================================
        // COMPONENT LIBRARY - Widget Components
        // ============================================
        
        const Components = {
            // Button component
            button(text, onClick, variant = 'primary', className = '') {
                const variants = {
                    primary: 'btn-primary',
                    secondary: 'btn-secondary',
                    success: 'bg-success text-white hover:bg-green-600',
                    danger: 'bg-danger text-white hover:bg-red-600'
                };
                
                return `
                    <button class="btn ${variants[variant]} ${className}" onclick="${onClick}">
                        ${text}
                    </button>
                `;
            },
            
            // Card component
            card(content, className = '') {
                return `<div class="card ${className}">${content}</div>`;
            },
            
            // Input component
            input(id, label, type = 'text', placeholder = '', value = '', onChange = '') {
                return `
                    <div class="mb-4">
                        <label class="block text-gray-700 font-semibold mb-2">${label}</label>
                        <input 
                            type="${type}" 
                            id="${id}" 
                            class="input-field" 
                            placeholder="${placeholder}"
                            value="${value}"
                            onchange="${onChange}"
                        >
                    </div>
                `;
            },
            
            // Textarea component
            textarea(id, label, placeholder = '', rows = 4, value = '') {
                return `
                    <div class="mb-4">
                        <label class="block text-gray-700 font-semibold mb-2">${label}</label>
                        <textarea 
                            id="${id}" 
                            class="input-field" 
                            placeholder="${placeholder}"
                            rows="${rows}"
                        >${value}</textarea>
                    </div>
                `;
            },
            
            // Select component
            select(id, label, options, value = '', onChange = '') {
                const optionHtml = options.map(opt => 
                    `<option value="${opt.value}" ${opt.value === value ? 'selected' : ''}>${opt.label}</option>`
                ).join('');
                
                return `
                    <div class="mb-4">
                        <label class="block text-gray-700 font-semibold mb-2">${label}</label>
                        <select id="${id}" class="input-field" onchange="${onChange}">
                            ${optionHtml}
                        </select>
                    </div>
                `;
            },
            
            // Modal component
            modal(title, content, onClose) {
                return `
                    <div class="modal-overlay" onclick="if(event.target === this) ${onClose}">
                        <div class="modal animate-fade-in">
                            <div class="p-6 border-b border-gray-200 flex justify-between items-center">
                                <h2 class="text-2xl font-bold text-gray-800">${title}</h2>
                                <button onclick="${onClose}" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
                            </div>
                            <div class="p-6">${content}</div>
                        </div>
                    </div>
                `;
            },
            
            // Progress bar component
            progressBar(current, total, className = '') {
                const percentage = total > 0 ? (current / total) * 100 : 0;
                return `
                    <div class="progress-bar ${className}">
                        <div class="progress-fill" style="width: ${percentage}%"></div>
                    </div>
                    <div class="text-sm text-gray-600 mt-1">${current} из ${total}</div>
                `;
            },
            
            // Timer component
            timer(seconds, elementId = 'timer') {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                const display = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
                let className = 'timer text-2xl font-bold';
                if (seconds <= 60) className += ' danger';
                else if (seconds <= 180) className += ' warning';
                
                return `<div id="${elementId}" class="${className}">${display}</div>`;
            },
            
            // Alert component
            alert(message, type = 'info') {
                const types = {
                    info: 'bg-blue-100 border-blue-500 text-blue-700',
                    success: 'bg-green-100 border-green-500 text-green-700',
                    warning: 'bg-yellow-100 border-yellow-500 text-yellow-700',
                    error: 'bg-red-100 border-red-500 text-red-700'
                };
                
                return `
                    <div class="${types[type]} border-l-4 p-4 mb-4 rounded">
                        ${message}
                    </div>
                `;
            },
            
            // Table component
            table(headers, rows, className = '') {
                const headerHtml = headers.map(h => `<th>${h}</th>`).join('');
                const rowHtml = rows.map(row => {
                    const cells = Array.isArray(row) ? row : Object.values(row);
                    return `<tr>${cells.map(cell => `<td>${cell}</td>`).join('')}</tr>`;
                }).join('');
                
                return `
                    <table class="data-table ${className}">
                        <thead><tr>${headerHtml}</tr></thead>
                        <tbody>${rowHtml}</tbody>
                    </table>
                `;
            }
        };
        
        // ============================================
        // QUESTION RENDERERS - Type-specific Logic
        // ============================================
        
        const QuestionRenderers = {
            // Single choice
            single(question, selectedAnswer, onAnswer) {
                const options = question.options.map((opt, idx) => `
                    <div class="option-card ${selectedAnswer === idx ? 'selected' : ''}" 
                         onclick="App.handleAnswer(${idx})">
                        <div class="flex items-center">
                            <input type="radio" name="answer" ${selectedAnswer === idx ? 'checked' : ''} class="mr-3">
                            <span>${opt.text}</span>
                        </div>
                    </div>
                `).join('');
                
                return `
                    <div class="space-y-3">
                        ${options}
                    </div>
                `;
            },
            
            // Multiple choice
            multiple(question, selectedAnswers, onAnswer) {
                const selected = selectedAnswers || [];
                const options = question.options.map((opt, idx) => `
                    <div class="option-card ${selected.includes(idx) ? 'selected' : ''}" 
                         onclick="App.toggleAnswer(${idx})">
                        <div class="flex items-center">
                            <input type="checkbox" name="answer" ${selected.includes(idx) ? 'checked' : ''} class="mr-3">
                            <span>${opt.text}</span>
                        </div>
                    </div>
                `).join('');
                
                return `
                    <div class="space-y-3">
                        ${options}
                    </div>
                `;
            },
            
            // Fill in the blank
            fill(question, answer, onAnswer) {
                return `
                    <div>
                        <p class="mb-4 text-lg">${question.text.replace('___', '<span class="border-b-2 border-primary px-4">___</span>')}</p>
                        <input type="text" id="fill-answer" class="input-field" 
                               placeholder="Введите ответ" value="${answer || ''}"
                               oninput="App.handleFillAnswer(this.value)">
                    </div>
                `;
            },
            
            // Sequence ordering
            sequence(question, currentOrder, onAnswer) {
                const items = question.options.map((opt, idx) => {
                    const order = currentOrder ? currentOrder.indexOf(idx) : idx;
                    return { id: idx, text: opt.text, order: order };
                }).sort((a, b) => a.order - b.order);
                
                const itemsHtml = items.map((item, idx) => `
                    <div class="draggable option-card p-3 mb-2 bg-white shadow" 
                         data-id="${item.id}"
                         onclick="App.moveSequenceItem(${item.id}, -1)"
                         ondblclick="App.moveSequenceItem(${item.id}, 1)">
                        <div class="flex justify-between items-center">
                            <span>${item.text}</span>
                            <span class="text-sm text-gray-500">Позиция: ${idx + 1}</span>
                        </div>
                    </div>
                `).join('');
                
                return `
                    <div class="space-y-2">
                        <p class="text-gray-600 mb-4">Расставьте элементы в правильном порядке (клик - влево, двойной клик - вправо)</p>
                        ${itemsHtml}
                    </div>
                `;
            },
            
            // Matching
            match(question, matches, onAnswer) {
                const leftItems = question.options.left || [];
                const rightItems = question.options.right || [];
                
                const leftHtml = leftItems.map((item, idx) => `
                    <div class="p-3 bg-gray-50 rounded mb-2" data-left="${idx}">
                        ${item.text}
                    </div>
                `).join('');
                
                const rightHtml = rightItems.map((item, idx) => `
                    <div class="p-3 bg-gray-50 rounded mb-2 cursor-pointer hover:bg-purple-50" 
                         data-right="${idx}"
                         onclick="App.selectMatch(${idx})">
                        ${item.text}
                    </div>
                `).join('');
                
                const matchesDisplay = matches ? Object.entries(matches).map(([left, right]) => `
                    <div class="text-sm bg-purple-100 p-2 rounded mb-1">
                        ${leftItems[left]?.text} ↔ ${rightItems[right]?.text}
                    </div>
                `).join('') : '';
                
                return `
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <h4 class="font-semibold mb-2">Левая колонка</h4>
                            ${leftHtml}
                        </div>
                        <div>
                            <h4 class="font-semibold mb-2">Правая колонка (выберите соответствие)</h4>
                            ${rightHtml}
                        </div>
                    </div>
                    ${matchesDisplay ? `<div class="mt-4"><h4 class="font-semibold mb-2">Текущие соответствия:</h4>${matchesDisplay}</div>` : ''}
                `;
            },
            
            // Open question
            open(question, answer, onAnswer) {
                return `
                    <div>
                        <textarea id="open-answer" class="input-field" rows="6" 
                                  placeholder="Введите ваш развернутый ответ..."
                                  oninput="App.handleOpenAnswer(this.value)">${answer || ''}</textarea>
                        <p class="text-sm text-gray-500 mt-2">Минимум 50 символов</p>
                    </div>
                `;
            }
        };
        
        // ============================================
        // APPLICATION LOGIC - Main Controller
        // ============================================
        
        const App = {
            state: {
                currentView: 'home',
                currentTest: null,
                currentQuestion: 0,
                answers: {},
                startTime: null,
                questionStartTime: null,
                timer: null,
                timeRemaining: null,
                selectedMatch: null,
                currentMatches: {}
            },
            
            init() {
                this.render();
                this.setupEventListeners();
            },
            
            setupEventListeners() {
                // Handle browser back button
                window.addEventListener('popstate', (e) => {
                    if (e.state && e.state.view) {
                        this.state.currentView = e.state.view;
                        this.render();
                    }
                });
                
                // Service Worker for PWA
                if ('serviceWorker' in navigator) {
                    // SW registration would go here
                }
            },
            
            navigate(view, params = {}) {
                this.state.currentView = view;
                history.pushState({ view, params }, '', '#' + view);
                this.render();
            },
            
            render() {
                const app = document.getElementById('app');
                const views = {
                    home: this.renderHome(),
                    testList: this.renderTestList(),
                    testCreate: this.renderTestCreate(),
                    testEdit: this.renderTestEdit(),
                    testTake: this.renderTestTake(),
                    results: this.renderResults(),
                    statistics: this.renderStatistics()
                };
                
                app.innerHTML = `
                    <div class="min-h-screen">
                        ${this.renderHeader()}
                        <main class="container mx-auto px-4 py-8">
                            ${views[this.state.currentView] || views.home}
                        </main>
                        ${this.renderFooter()}
                    </div>
                `;
            },
            
            renderHeader() {
                return `
                    <header class="bg-white shadow-lg">
                        <div class="container mx-auto px-4 py-4">
                            <div class="flex justify-between items-center">
                                <div class="flex items-center space-x-4">
                                    <h1 class="text-3xl font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">
                                        TestUS
                                    </h1>
                                    <nav class="hidden md:flex space-x-4">
                                        <button onclick="App.navigate('home')" class="text-gray-600 hover:text-primary">Главная</button>
                                        <button onclick="App.navigate('testList')" class="text-gray-600 hover:text-primary">Тесты</button>
                                        <button onclick="App.navigate('results')" class="text-gray-600 hover:text-primary">Результаты</button>
                                    </nav>
                                </div>
                                <button onclick="App.navigate('testCreate')" class="btn btn-primary">
                                    + Создать тест
                                </button>
                            </div>
                        </div>
                    </header>
                `;
            },
            
            renderFooter() {
                return `
                    <footer class="bg-gray-800 text-white py-6 mt-8">

            saveTest() {
                const title = document.getElementById('test-title').value;
                const description = document.getElementById('test-description').value;
                const timeLimit = parseInt(document.getElementById('time-limit').value) || null;
                const passingScore = parseInt(document.getElementById('passing-score').value) || 70;
                
                if (!title) {
                    alert('Введите название теста');
                    return;
                }
                
                const test = {
                    ...DataLayer.structures.test,
                    title,
                    description,
                    settings: {
                        timeLimit,
                        passingScore,
                        randomizeQuestions: document.getElementById('randomize').checked,
                        showResults: document.getElementById('show-results').checked,
                        allowReview: document.getElementById('allow-review').checked
                    }
                };
                
                // Collect sections
                const sections = document.querySelectorAll('.section-item');
                sections.forEach(sectionEl => {
                    const section = {
                        ...DataLayer.structures.section,
                        title: sectionEl.querySelector('[data-section-title]').value,
                        questions: []
                    };
                    
                    const questions = sectionEl.querySelectorAll('.question-item');
                    questions.forEach(questionEl => {
                        const type = questionEl.querySelector('[data-question-type]').value;
                        const text = questionEl.querySelector('[data-question-text]').value;
                        const weight = parseInt(questionEl.querySelector('[data-question-weight]').value) || 1;
                        
                        const question = {
                            ...DataLayer.structures.question,
                            type,
                            text,
                            weight
                        };
                        
                        // Collect options
                        const options = [];
                        const correctAnswers = [];
                        
                        questionEl.querySelectorAll('[data-option]').forEach((optEl, idx) => {
                            const text = optEl.querySelector('[data-option-text]').value;
                            if (text) {
                                options.push({ id: idx, text });
                                if (optEl.querySelector('[data-correct]')?.checked) {
                                    correctAnswers.push(idx);
                                }
                            }
                        });
                        
                        question.options = options;
                        question.correctAnswers = correctAnswers;
                        section.questions.push(question);
                    });
                    
                    test.sections.push(section);
                });
                
                DataLayer.saveTest(test);
                alert('Тест успешно сохранен!');
                this.navigate('testList');
            },
            
            // Test taking logic
            startTest(testId) {
                const test = DataLayer.getTest(testId);
                if (!test) return;
                
                this.state.currentTest = test;
                this.state.currentQuestion = 0;
                this.state.answers = {};
                this.state.startTime = Date.now();
                this.state.questionStartTime = Date.now();
                
                if (test.settings.timeLimit) {
                    this.state.timeRemaining = test.settings.timeLimit * 60;
                    this.startTimer();
                }
                
                this.navigate('testTake');
            },
            
            startTimer() {
                if (this.state.timer) clearInterval(this.state.timer);
                
                this.state.timer = setInterval(() => {
                    this.state.timeRemaining--;
                    
                    if (this.state.timeRemaining <= 0) {
                        this.completeTest();
                    } else {
                        const timerEl = document.getElementById('timer');
                        if (timerEl) {
                            timerEl.outerHTML = Components.timer(this.state.timeRemaining);
                        }
                    }
                }, 1000);
            },
            
            handleAnswer(optionIdx) {
                const question = this.getCurrentQuestion();
                this.state.answers[question.id] = optionIdx;
                this.render();
            },
            
            toggleAnswer(optionIdx) {
                const question = this.getCurrentQuestion();
                let answers = this.state.answers[question.id] || [];
                
                if (answers.includes(optionIdx)) {
                    answers = answers.filter(a => a !== optionIdx);
                } else {
                    answers.push(optionIdx);
                }
                
                this.state.answers[question.id] = answers;
                this.render();
            },
            
            handleFillAnswer(value) {
                const question = this.getCurrentQuestion();
                this.state.answers[question.id] = value;
            },
            
            handleOpenAnswer(value) {
                const question = this.getCurrentQuestion();
                this.state.answers[question.id] = value;
            },
            
            moveSequenceItem(itemId, direction) {
                const question = this.getCurrentQuestion();
                let order = this.state.answers[question.id] || 
                           question.options.map((_, i) => i);
                
                const idx = order.indexOf(itemId);
                const newIdx = idx + direction;
                
                if (newIdx >= 0 && newIdx < order.length) {
                    [order[idx], order[newIdx]] = [order[newIdx], order[idx]];
                    this.state.answers[question.id] = order;
                    this.render();
                }
            },
            
            selectMatch(rightIdx) {
                const question = this.getCurrentQuestion();
                if (this.state.selectedMatch === null) {
                    this.state.selectedMatch = rightIdx;
                } else {
                    this.state.currentMatches[this.state.selectedMatch] = rightIdx;
                    this.state.selectedMatch = null;
                    this.state.answers[question.id] = { ...this.state.currentMatches };
                    this.render();
                }
            },
            
            getCurrentQuestion() {
                const test = this.state.currentTest;
                const allQuestions = test.sections.flatMap(s => s.questions);
                return allQuestions[this.state.currentQuestion];
            },
            
            prevQuestion() {
                if (this.state.currentQuestion > 0) {
                    this.state.currentQuestion--;
                    this.state.questionStartTime = Date.now();
                    this.render();
                }
            },
            
            nextQuestion() {
                const test = this.state.currentTest;
                const allQuestions = test.sections.flatMap(s => s.questions);
                
                if (this.state.currentQuestion < allQuestions.length - 1) {
                    this.state.currentQuestion++;
                    this.state.questionStartTime = Date.now();
                    this.render();
                } else {
                    this.completeTest();
                }
            },
            
            completeTest() {
                if (this.state.timer) clearInterval(this.state.timer);
                
                const test = this.state.currentTest;
                const allQuestions = test.sections.flatMap(s => s.questions);
                const endTime = Date.now();
                const duration = Math.floor((endTime - this.state.startTime) / 1000);
                
                // Calculate score
                let score = 0;
                let maxScore = 0;
                const questionResults = [];
                
                allQuestions.forEach((q, idx) => {
                    const userAnswer = this.state.answers[q.id];
                    const maxPoints = q.weight;
                    maxScore += maxPoints;
                    
                    let points = 0;
                    let isCorrect = false;
                    
                    switch (q.type) {
                        case 'single':
                            isCorrect = userAnswer === q.correctAnswers[0];
                            points = isCorrect ? maxPoints : 0;
                            break;
                            
                        case 'multiple':
                            const correct = q.correctAnswers.sort().join(',');
                            const user = (userAnswer || []).sort().join(',');
                            isCorrect = correct === user;
                            points = isCorrect ? maxPoints : 0;
                            break;
                            
                        case 'fill':
                            isCorrect = (userAnswer || '').toLowerCase().trim() === 
                                      q.correctAnswers[0]?.toLowerCase().trim();
                            points = isCorrect ? maxPoints : 0;
                            break;
                            
                        case 'sequence':
                            const correctOrder = q.correctAnswers.join(',');
                            const userOrder = (userAnswer || []).join(',');
                            isCorrect = correctOrder === userOrder;
                            points = isCorrect ? maxPoints : 0;
                            break;
                            
                        case 'match':
                            // Simplified matching check
                            isCorrect = JSON.stringify(userAnswer) === JSON.stringify(q.correctAnswers[0]);
                            points = isCorrect ? maxPoints : 0;
                            break;
                            
                        case 'open':
                            // Open questions need manual review
                            points = 0;
                            isCorrect = false;
                            break;
                    }
                    
                    score += points;
                    questionResults.push({
                        questionId: q.id,
                        questionText: q.text,
                        correct: isCorrect,
                        points,
                        maxPoints,
                        userAnswer,
                        correctAnswer: q.correctAnswers
                    });
                });
                
                const percentage = maxScore > 0 ? (score / maxScore) * 100 : 0;
                
                const result = {
                    ...DataLayer.structures.result,
                    testId: test.id,
                    userId: 'user_' + Date.now(),
                    answers: this.state.answers,
                    score,
                    maxScore,
                    percentage,
                    startTime: new Date(this.state.startTime).toISOString(),
                    endTime: new Date(endTime).toISOString(),
                    duration,
                    questionResults
                };
                
                DataLayer.saveResult(result);
                
                // Show results
                this.showTestResults(result, test);
            },
            
            showTestResults(result, test) {
                const passed = result.percentage >= test.settings.passingScore;
                
                const modalContent = `
                    <div class="text-center">
                        <div class="text-6xl mb-4">${passed ? '🎉' : '😔'}</div>
                        <h3 class="text-3xl font-bold mb-4">${passed ? 'Тест сдан!' : 'Тест не сдан'}</h3>
                        <div class="grid md:grid-cols-3 gap-4 mb-6">
                            <div class="bg-gray-100 p-4 rounded">
                                <div class="text-2xl font-bold text-primary">${result.score}/${result.maxScore}</div>
                                <div class="text-sm text-gray-600">Баллы</div>
                            </div>
                            <div class="bg-gray-100 p-4 rounded">
                                <div class="text-2xl font-bold text-primary">${result.percentage.toFixed(1)}%</div>
                                <div class="text-sm text-gray-600">Процент</div>
                            </div>
                            <div class="bg-gray-100 p-4 rounded">
                                <div class="text-2xl font-bold text-primary">${Math.floor(result.duration / 60)}м ${result.duration % 60}с</div>
                                <div class="text-sm text-gray-600">Время</div>
                            </div>
                        </div>
                        
                        ${test.settings.showResults ? `
                            <div class="text-left max-h-96 overflow-y-auto">
                                <h4 class="font-bold mb-2">Детализация по вопросам:</h4>
                                ${result.questionResults.map((qr, idx) => `
                                    <div class="p-3 mb-2 rounded ${qr.correct ? 'bg-green-100' : 'bg-red-100'}">
                                        <div class="flex justify-between">
                                            <span>Вопрос ${idx + 1}: ${qr.questionText.substring(0, 50)}...</span>
                                            <span class="font-bold">${qr.points}/${qr.maxPoints}</span>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}
                        
                        <div class="mt-6 space-x-4">
                            ${Components.button('Закрыть', "App.navigate('home')", 'success')}
                            ${Components.button('Экспорт результата', 'App.downloadResult()', 'secondary')}
                        </div>
                    </div>
                `;
                
                document.getElementById('app').insertAdjacentHTML('beforeend', 
                    Components.modal('Результаты теста', modalContent, "this.remove()")
                );
            },
            
            downloadResult() {
                alert('Функция экспорта одного результата будет реализована');
            },
            
            editTest(testId) {
                // Load test and populate form
                this.navigate('testCreate');
            },
            
            deleteTest(testId) {
                if (confirm('Вы уверены, что хотите удалить этот тест?')) {
                    DataLayer.deleteTest(testId);
                    this.render();
                }
            },
            
            viewTestResults(testId) {
                this.navigate('results');
            },
            
            exportResults() {
                const tests = DataLayer.getAllTests();
                if (tests.length === 0) {
                    alert('Нет тестов для экспорта');
                    return;
                }
                
                let csv = 'Тест;ID;Дата начала;Дата окончания;Продолжительность (сек);Баллы;Макс баллы;Процент;Статус\n';
                
                tests.forEach(test => {
                    const results = DataLayer.getResults(test.id);
                    results.forEach(r => {
                        const status = r.percentage >= test.settings.passingScore ? 'Сдан' : 'Не сдан';
                        csv += `${test.title};${r.id};${new Date(r.startTime).toLocaleString()};${new Date(r.endTime).toLocaleString()};${r.duration};${r.score};${r.maxScore};${r.percentage.toFixed(1)}%;${status}\n`;
                    });
                });
                
                const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `testus_results_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
            }
        };
        
        // Initialize application
        document.addEventListener('DOMContentLoaded', () => {
            App.init();
        });
        
        // Handle offline mode
        window.addEventListener('offline', () => {
            alert('Вы работаете в офлайн режиме. Данные сохраняются локально.');
        });
        
        window.addEventListener('online', () => {
            alert('Соединение восстановлено!');
        });
    </script>
</body>
</html>
