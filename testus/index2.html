  <!-- Модальное окно предупреждения о времени -->
  <div id="timeout-modal" class="fixed inset-0 z-[60] hidden items-center justify-center bg-black/80 backdrop-blur-sm">
    <div class="bg-slate-800 border border-red-500/50 rounded-xl p-8 max-w-md w-full mx-4 text-center shadow-2xl">
      <div class="text-5xl mb-4">⏰</div>

      <p class="text-slate-300 mb-6">Отведённое время на прохождение теста истекло. Ваши ответы будут сохранены автоматически.</p>
      <button id="timeout-ok-btn" class="px-6 py-2 bg-red-600 rounded-lg hover:bg-red-500 transition font-semibold">
        Посмотреть результаты
      </button>
    </div>
  </div>

  <script>
    // ───────────────────────────── ДАННЫЕ (JSON-структуры) ─────────────────────────────
    const APP_DATA = {
      questionTypes: {
        single_choice: { id: 'single_choice', name: 'Одиночный выбор', icon: '⚪', defaultWeight: 1, widgetConfig: { type: 'radio', multiple: false } },
        multiple_choice: { id: 'multiple_choice', name: 'Множественный выбор', icon: '☑️', defaultWeight: 2, widgetConfig: { type: 'checkbox', multiple: true } },
        fill_blank: { id: 'fill_blank', name: 'Заполнить пропуск', icon: '✍️', defaultWeight: 2, widgetConfig: { type: 'text', caseSensitive: false } },
        ordering: { id: 'ordering', name: 'Последовательность', icon: '🔢', defaultWeight: 3, widgetConfig: { type: 'sortable', draggable: true } },
        matching: { id: 'matching', name: 'Сопоставление', icon: '🔗', defaultWeight: 3, widgetConfig: { type: 'matching', pairs: true } },
        open_text: { id: 'open_text', name: 'Открытый вопрос', icon: '📝', defaultWeight: 5, widgetConfig: { type: 'textarea', manualGrading: true } }
      },
      demoQuiz: { 
        id: 'quiz_demo_001', 
        title: 'Демо: Все типы вопросов', 
        description: 'Тест с ограничением времени 5 минут.', 
        timeLimit: 300, // 5 минут в секундах
        shuffleQuestions: false, 
        sections: [
          { 
            id: 'sec_basics', 
            title: 'Основы', 
            weight: 1, 
            questions: [
              { id: 'q1', type: 'single_choice', text: 'Язык разметки веб-страниц?', weight: 1, options: [{id:'a',text:'HTML',correct:true,weight:1},{id:'b',text:'CSS',correct:false,weight:0}] },
              { id: 'q2', type: 'multiple_choice', text: 'Выберите языки программирования', weight: 2, options: [{id:'a',text:'Python',correct:true,weight:1},{id:'b',text:'HTML',correct:false,weight:0},{id:'c',text:'Rust',correct:true,weight:1}] }
            ] 
          },
          {
            id: 'sec_advanced',
            title: 'Продвинутые',
            weight: 1.5,
            questions: [
              { id: 'q3', type: 'fill_blank', text: 'Фреймворк от Facebook: ______', weight: 2, correctAnswer: 'React' },
              { id: 'q4', type: 'ordering', text: 'Этапы разработки по порядку', weight: 3, orderOptions: [
                {id:'o1',text:'Анализ',position:1},{id:'o2',text:'Дизайн',position:2},{id:'o3',text:'Код',position:3},{id:'o4',text:'Тест',position:4}
              ]}
            ]
          }
        ] 
      },
      quickQuiz: {
        id: 'quiz_quick_002',
        title: 'Быстрый опрос (30 сек)',
        description: 'Тест с жёстким ограничением времени для демонстрации таймера.',
        timeLimit: 30,
        shuffleQuestions: false,
        sections: [
          {
            id: 'sec_quick',
            title: 'Быстрые вопросы',
            weight: 1,
            questions: [
              { id: 'qq1', type: 'single_choice', text: '2 + 2 = ?', weight: 1, options: [{id:'a',text:'3',correct:false},{id:'b',text:'4',correct:true},{id:'c',text:'5',correct:false}] },
              { id: 'qq2', type: 'fill_blank', text: 'Столица Франции: ______', weight: 2, correctAnswer: 'Париж' }
            ]
          }
        ]
      }
    };

    // ───────────────────────── БАЗОВЫЕ УТИЛИТЫ ─────────────────────────
    const Storage = {
      prefix: 'testus_',
      set(key, value) { 
        try { 
          localStorage.setItem(this.prefix + key, JSON.stringify(value)); 
        } catch(e) { 
          console.error('Storage set error:', e);
        } 
      },
      get(key, fallback = null) { 
        try { 
          const v = localStorage.getItem(this.prefix + key); 
          return v ? JSON.parse(v) : fallback; 
        } catch(e) { 
          console.error('Storage get error:', e);
          return fallback; 
        } 
      },
      remove(key) { 
        try {
          localStorage.removeItem(this.prefix + key); 
        } catch(e) {
          console.error('Storage remove error:', e);
        }
      }
    };

    function generateId() { 
      return 'id_' + Date.now() + '_' + Math.random().toString(36).substring(2, 11); 
    }

    function cloneQuestion(q) {
      return JSON.parse(JSON.stringify(q));
    }

    const State = {
      currentView: 'quizzes',
      activeQuizId: null,
      activeSession: null,
      quizzes: Storage.get('quizzes', [APP_DATA.demoQuiz, APP_DATA.quickQuiz]),
      questionBank: Storage.get('questionBank', []),
      timerInterval: null,
      saveQuizzes() { 
        Storage.set('quizzes', this.quizzes); 
      },
      saveBank() { 
        Storage.set('questionBank', this.questionBank); 
      },
      get history() { 
        return Storage.get('history', []); 
      },
      set history(val) { 
        Storage.set('history', val); 
      }
    };

    // ──────────────────────── МЕНЕДЖЕР ТАЙМЕРА ────────────────────────
    const Timer = {
      totalSeconds: 0,
      remainingSeconds: 0,
      intervalId: null,
      onTick: null,
      onTimeout: null,
      isRunning: false,
      warnThreshold: 60, // Предупреждение за 60 секунд

      start(seconds, onTickCallback, onTimeoutCallback) {
        this.stop();
        this.totalSeconds = seconds;
        this.remainingSeconds = seconds;
        this.onTick = onTickCallback;
        this.onTimeout = onTimeoutCallback;
        this.isRunning = true;
        
        // Показываем таймер
        const timerDisplay = document.getElementById('timer-display');
        if (timerDisplay) timerDisplay.classList.remove('hidden');
        
        this.updateDisplay();
        
        this.intervalId = setInterval(() => {
          this.remainingSeconds--;
          this.updateDisplay();
          
          if (this.onTick) this.onTick(this.remainingSeconds, this.totalSeconds);
          
          if (this.remainingSeconds <= 0) {
            this.stop();
            if (this.onTimeout) this.onTimeout();
          }
        }, 1000);
      },

      stop() {
        if (this.intervalId) {
          clearInterval(this.intervalId);
          this.intervalId = null;
        }
        this.isRunning = false;
        
        const timerDisplay = document.getElementById('timer-display');
        if (timerDisplay) timerDisplay.classList.add('hidden');
        
        // Сбрасываем индикатор
        const indicator = document.getElementById('timer-indicator');
        if (indicator) {
          indicator.className = 'w-1.5 h-1.5 rounded-full bg-green-400';
        }
      },

      pause() {
        if (this.intervalId) {
          clearInterval(this.intervalId);
          this.intervalId = null;
        }
        this.isRunning = false;
      },

      resume() {
        if (!this.isRunning && this.remainingSeconds > 0) {
          this.isRunning = true;
          this.intervalId = setInterval(() => {
            this.remainingSeconds--;
            this.updateDisplay();
            
            if (this.onTick) this.onTick(this.remainingSeconds, this.totalSeconds);
            
            if (this.remainingSeconds <= 0) {
              this.stop();
              if (this.onTimeout) this.onTimeout();
            }
          }, 1000);
        }
      },

      updateDisplay() {
        const timerText = document.getElementById('timer-text');
        const indicator = document.getElementById('timer-indicator');
        
        if (timerText) {
          const minutes = Math.floor(this.remainingSeconds / 60);
          const seconds = this.remainingSeconds % 60;
          timerText.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
          
          // Цветовое кодирование
          if (this.remainingSeconds <= this.warnThreshold) {
            timerText.className = 'text-lg font-mono font-bold text-red-400 timer-warning';
          } else if (this.remainingSeconds <= this.warnThreshold * 2) {
            timerText.className = 'text-lg font-mono font-bold text-yellow-400';
          } else {
            timerText.className = 'text-lg font-mono font-bold text-green-400';
          }
        }
        
        if (indicator) {
          const percentage = (this.remainingSeconds / this.totalSeconds) * 100;
          if (percentage <= 10) {
            indicator.className = 'w-1.5 h-1.5 rounded-full bg-red-500 timer-warning';
          } else if (percentage <= 25) {
            indicator.className = 'w-1.5 h-1.5 rounded-full bg-yellow-500';
          } else {
            indicator.className = 'w-1.5 h-1.5 rounded-full bg-green-400';
          }
        }
      },

      getElapsedSeconds() {
        return this.totalSeconds - this.remainingSeconds;
      }
    };

    // ──────────────────────── DRAG & DROP МЕНЕДЖЕР ────────────────────────
    const DragDrop = {
      draggedElement: null,
      draggedData: null,
      dragType: null,
      sourceSectionIndex: null,
      sourceQuestionIndex: null,
      tooltip: null,
      draggedBankItem: null,

      init() {
        this.tooltip = document.getElementById('drag-tooltip');
        
        document.addEventListener('dragover', (e) => {
          if (this.dragType && this.tooltip) {
            this.tooltip.style.left = (e.clientX + 15) + 'px';
            this.tooltip.style.top = (e.clientY - 25) + 'px';
            this.tooltip.classList.remove('hidden');
          }
        });
        
        document.addEventListener('dragend', () => {
          this.cleanup();
        });

        document.addEventListener('drop', (e) => {
          e.preventDefault();
        });
      },

      cleanup() {
        if (this.tooltip) this.tooltip.classList.add('hidden');
        document.querySelectorAll('.drag-over, .section-drag-over, .dragging').forEach(el => {
          el.classList.remove('drag-over', 'section-drag-over', 'dragging');
        });
        this.draggedElement = null;
        this.draggedData = null;
        this.dragType = null;
        this.sourceSectionIndex = null;
        this.sourceQuestionIndex = null;
        if (this.draggedBankItem) {
          this.draggedBankItem.classList.remove('bank-item-dragging');
          this.draggedBankItem = null;
        }
      },

      makeSectionDraggable(element, sectionIndex) {
        element.setAttribute('draggable', 'true');
        element.classList.add('section-drop-zone');
        
        element.addEventListener('dragstart', (e) => {
          this.dragType = 'section';
          this.sourceSectionIndex = sectionIndex;
          this.draggedElement = element;
          element.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', `section:${sectionIndex}`);
          if (this.tooltip) this.tooltip.textContent = 'Переместить секцию';
        });
        
        element.addEventListener('dragend', () => {
          element.classList.remove('dragging');
          this.cleanup();
        });
      },

      makeSectionDropZone(element, sectionIndex) {
        element.addEventListener('dragover', (e) => {
          if (this.dragType !== 'section' && this.dragType !== 'question' && !this.draggedBankItem) return;
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          element.classList.add('section-drag-over');
        });
        
        element.addEventListener('dragleave', (e) => {
          if (!element.contains(e.relatedTarget)) {
            element.classList.remove('section-drag-over');
          }
        });
        
        element.addEventListener('drop', (e) => {
          e.preventDefault();
          e.stopPropagation();
          element.classList.remove('section-drag-over');
          
          if (this.draggedBankItem) {
            this.handleBankItemDrop(sectionIndex);
            this.cleanup();
            return;
          }
          
          if (this.dragType === 'section' && this.sourceSectionIndex !== null) {
            this.handleSectionDrop(sectionIndex);
          }
          else if (this.dragType === 'question' && this.sourceSectionIndex !== null && this.sourceQuestionIndex !== null) {
            const quiz = State.quizzes.find(q => q.id === Editor.currentQuizId);
            if (quiz && quiz.sections[sectionIndex]) {
              const targetSection = quiz.sections[sectionIndex];
              const sourceSection = quiz.sections[this.sourceSectionIndex];
              if (sourceSection) {
                const [movedQuestion] = sourceSection.questions.splice(this.sourceQuestionIndex, 1);
                targetSection.questions.push(movedQuestion);
                State.saveQuizzes();
                Editor.renderSections(quiz);
              }
            }
          }
          
          this.cleanup();
        });
      },

      makeQuestionDraggable(element, sectionIndex, questionIndex) {
        element.setAttribute('draggable', 'true');
        
        element.addEventListener('dragstart', (e) => {
          e.stopPropagation();
          this.dragType = 'question';
          this.sourceSectionIndex = sectionIndex;
          this.sourceQuestionIndex = questionIndex;
          this.draggedElement = element;
          element.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', `question:${sectionIndex}:${questionIndex}`);
          if (this.tooltip) this.tooltip.textContent = 'Переместить вопрос';
        });
        
        element.addEventListener('dragend', () => {
          element.classList.remove('dragging');
          this.cleanup();
        });
      },

      makeQuestionDropZone(element, sectionIndex, questionIndex) {
        element.addEventListener('dragover', (e) => {
          if (this.dragType !== 'question') return;
          e.preventDefault();
          e.stopPropagation();
          e.dataTransfer.dropEffect = 'move';
          element.classList.add('drag-over');
        });
        
        element.addEventListener('dragleave', (e) => {
          if (!element.contains(e.relatedTarget)) {
            element.classList.remove('drag-over');
          }
        });
        
        element.addEventListener('drop', (e) => {
          e.preventDefault();
          e.stopPropagation();
          element.classList.remove('drag-over');
          
          if (this.dragType === 'question' && this.sourceSectionIndex !== null && this.sourceQuestionIndex !== null) {
            this.handleQuestionDrop(sectionIndex, questionIndex);
          }
          
          this.cleanup();
        });
      },

      makeBankItemDraggable(element, questionData) {
        element.setAttribute('draggable', 'true');
        element.__dragData = JSON.stringify(questionData);
        
        element.addEventListener('dragstart', (e) => {
          this.draggedBankItem = element;
          this.dragType = null;
          element.classList.add('bank-item-dragging');
          e.dataTransfer.effectAllowed = 'copy';
          e.dataTransfer.setData('application/json', JSON.stringify(questionData));
          if (this.tooltip) this.tooltip.textContent = 'Копировать в секцию';
        });
        
        element.addEventListener('dragend', () => {
          element.classList.remove('bank-item-dragging');
          this.draggedBankItem = null;
          this.cleanup();
        });
      },

      handleSectionDrop(targetIndex) {
        const quiz = State.quizzes.find(q => q.id === Editor.currentQuizId);
        if (!quiz || this.sourceSectionIndex === null) return;
        if (this.sourceSectionIndex === targetIndex) return;
        
        const [movedSection] = quiz.sections.splice(this.sourceSectionIndex, 1);
        const finalIndex = targetIndex > this.sourceSectionIndex ? targetIndex - 1 : targetIndex;
        quiz.sections.splice(finalIndex, 0, movedSection);
        State.saveQuizzes();
        Editor.renderSections(quiz);
      },

      handleQuestionDrop(targetSectionIndex, targetQuestionIndex) {
        const quiz = State.quizzes.find(q => q.id === Editor.currentQuizId);
        if (!quiz || this.sourceSectionIndex === null || this.sourceQuestionIndex === null) return;
        
        const sourceSection = quiz.sections[this.sourceSectionIndex];
        const targetSection = quiz.sections[targetSectionIndex];
        
        if (!sourceSection || !targetSection) return;
        if (this.sourceQuestionIndex >= sourceSection.questions.length) return;
        
        const [movedQuestion] = sourceSection.questions.splice(this.sourceQuestionIndex, 1);
        
        let finalTarget = targetQuestionIndex;
        if (this.sourceSectionIndex === targetSectionIndex && this.sourceQuestionIndex < targetQuestionIndex) {
          finalTarget--;
        }
        
        finalTarget = Math.max(0, Math.min(finalTarget, targetSection.questions.length));
        targetSection.questions.splice(finalTarget, 0, movedQuestion);
        State.saveQuizzes();
        Editor.renderSections(quiz);
      },

      handleBankItemDrop(sectionIndex) {
        if (!this.draggedBankItem) return;
        
        const quiz = State.quizzes.find(q => q.id === Editor.currentQuizId);
        if (!quiz || sectionIndex < 0 || sectionIndex >= quiz.sections.length) return;
        
        try {
          const jsonData = this.draggedBankItem.__dragData;
          if (jsonData) {
            const questionData = JSON.parse(jsonData);
            if (questionData && questionData.text) {
              const newQuestion = cloneQuestion(questionData);
              newQuestion.id = generateId();
              quiz.sections[sectionIndex].questions.push(newQuestion);
              State.saveQuizzes();
              Editor.renderSections(quiz);
            }
          }
        } catch (err) {
          console.error('Bank item drop error:', err);
        }
      }
    };

    // ──────────────────────── ОЦЕНИВАНИЕ ────────────────────────
    function evaluateQuestion(question, userAnswer) {
      const type = question.type; 
      let earned = 0; 
      const maxWeight = question.weight || 1; 
      const details = { correct: false, partial: false };
      
      switch(type) {
        case 'single_choice': { 
          const sel = userAnswer?.selected; 
          const corr = question.options?.find(o => o.correct); 
          if (corr && sel === corr.id) { 
            earned = maxWeight; 
            details.correct = true; 
          } 
          break; 
        }
        case 'multiple_choice': { 
          const sel = userAnswer?.selected || []; 
          const corr = (question.options || []).filter(o => o.correct); 
          if (corr.length === 0) break;
          const wrong = sel.filter(id => !corr.some(c => c.id === id)); 
          if (wrong.length === 0 && sel.length === corr.length) { 
            earned = maxWeight; 
            details.correct = true; 
          } else if (wrong.length === 0 && sel.length > 0) { 
            earned = Math.round((maxWeight * (sel.length / corr.length)) * 100) / 100; 
            details.partial = true; 
          } 
          break; 
        }
        case 'fill_blank': { 
          const txt = (userAnswer?.text || '').trim(); 
          const corr = (question.correctAnswer || '').trim(); 
          if (!corr) break;
          const cs = question.widgetConfig?.caseSensitive || false; 
          const ok = cs ? txt === corr : txt.toLowerCase() === corr.toLowerCase(); 
          earned = ok ? maxWeight : 0; 
          details.correct = ok; 
          break; 
        }
        case 'ordering': { 
          const order = userAnswer?.order || []; 
          const corrOrder = [...(question.orderOptions || [])]
            .sort((a, b) => a.position - b.position)
            .map(o => o.id); 
          if (corrOrder.length === 0) break;
          if (JSON.stringify(order) === JSON.stringify(corrOrder)) { 
            earned = maxWeight; 
            details.correct = true; 
          } else { 
            const match = order.filter((id, i) => id === corrOrder[i]).length; 
            earned = match === corrOrder.length ? maxWeight : 
              Math.round((maxWeight * (match / corrOrder.length)) * 100) / 100; 
            details.partial = match > 0; 
          } 
          break; 
        }
        case 'matching': { 
          const pairs = userAnswer?.pairs || {}; 
          const corr = question.matchingPairs?.correctMapping || {}; 
          const total = Object.keys(corr).length; 
          if (total === 0) break;
          let cnt = 0; 
          for (let [l, r] of Object.entries(pairs)) { 
            if (corr[l] === r) cnt++; 
          } 
          earned = cnt === total ? maxWeight : 
            Math.round((maxWeight * (cnt / total)) * 100) / 100; 
          details.correct = cnt === total; 
          details.partial = cnt > 0 && cnt < total; 
          break; 
        }
        case 'open_text': 
          earned = 0; 
          break;
      } 
      
      return { earned, max: maxWeight, details };
    }

    // ──────────────────────── РЕНДЕРЕР ВИДЖЕТОВ ────────────────────────
    const WidgetRenderer = {
      renderQuestion(q, answer = null, idx) {
        const div = document.createElement('div'); 
        div.className = 'bg-slate-800/60 border border-slate-700 rounded-xl p-5 mb-5'; 
        div.dataset.questionId = q.id;
        
        const headerDiv = document.createElement('div');
        headerDiv.className = 'flex justify-between items-start mb-3';
        headerDiv.innerHTML = `
          <h3 class="text-lg font-semibold">${idx + 1}. ${this.esc(q.text || 'Без текста')}</h3>
          <span class="text-xs bg-slate-700 px-2 py-1 rounded-full">Вес: ${q.weight || 1}</span>
        `;
        div.appendChild(headerDiv);
        
        const body = document.createElement('div'); 
        body.className = 'mt-3';
        
        switch(q.type) {
          case 'single_choice': this.radio(body, q, answer); break;
          case 'multiple_choice': this.checkbox(body, q, answer); break;
          case 'fill_blank': this.fill(body, q, answer); break;
          case 'ordering': this.order(body, q, answer); break;
          case 'matching': this.match(body, q, answer); break;
          case 'open_text': this.textarea(body, q, answer); break;
          default: body.innerHTML = '<p class="text-slate-400">Неизвестный тип вопроса</p>';
        }
        
        div.appendChild(body); 
        return div;
      },
      
      esc(t) { 
        if (t === null || t === undefined) return '';
        const d = document.createElement('div'); 
        d.textContent = String(t); 
        return d.innerHTML; 
      },
      
      radio(c, q, a) { 
        if (!q.options || q.options.length === 0) {
          c.innerHTML = '<p class="text-slate-400">Нет вариантов ответа</p>';
          return;
        }
        q.options.forEach(o => { 
          const l = document.createElement('label'); 
          l.className = 'flex items-center gap-3 p-3 bg-slate-900/50 rounded-lg mb-2 cursor-pointer hover:bg-slate-700/40 transition'; 
          const r = document.createElement('input'); 
          r.type = 'radio'; 
          r.name = 'q_' + q.id; 
          r.value = o.id; 
          r.className = 'accent-cyan-500 w-4 h-4'; 
          if (a?.selected === o.id) r.checked = true; 
          l.appendChild(r); 
          l.append(this.esc(o.text)); 
          c.appendChild(l); 
        }); 
      },
      
      checkbox(c, q, a) { 
        if (!q.options || q.options.length === 0) {
          c.innerHTML = '<p class="text-slate-400">Нет вариантов ответа</p>';
          return;
        }
        const sel = a?.selected || []; 
        q.options.forEach(o => { 
          const l = document.createElement('label'); 
          l.className = 'flex items-center gap-3 p-3 bg-slate-900/50 rounded-lg mb-2 cursor-pointer hover:bg-slate-700/40 transition'; 
          const cb = document.createElement('input'); 
          cb.type = 'checkbox'; 
          cb.value = o.id; 
          cb.className = 'accent-cyan-500 w-4 h-4 rounded'; 
          if (sel.includes(o.id)) cb.checked = true; 
          l.appendChild(cb); 
          l.append(this.esc(o.text)); 
          c.appendChild(l); 
        }); 
      },
      
      fill(c, q, a) { 
        const i = document.createElement('input'); 
        i.type = 'text'; 
        i.className = 'w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-slate-100 focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400'; 
        i.placeholder = 'Введите ответ...';
        i.value = a?.text || ''; 
        c.appendChild(i); 
      },
      
      order(c, q, a) { 
        if (!q.orderOptions || q.orderOptions.length === 0) {
          c.innerHTML = '<p class="text-slate-400">Нет элементов для сортировки</p>';
          return;
        }
        const ul = document.createElement('ul'); 
        ul.className = 'space-y-2'; 
        let order = a?.order || q.orderOptions.map(o => o.id); 
        if (!a?.order) order = [...order].sort(() => Math.random() - 0.5); 
        order.forEach((id, idx) => { 
          const it = q.orderOptions.find(o => o.id === id); 
          if (!it) return; 
          const li = document.createElement('li'); 
          li.className = 'flex items-center gap-3 bg-slate-900 p-3 rounded-lg border border-slate-700 cursor-grab active:cursor-grabbing'; 
          li.draggable = true; 
          li.dataset.optionId = it.id; 
          li.innerHTML = `<span class="text-cyan-400 font-bold">${idx + 1}.</span> <span>${this.esc(it.text)}</span>`; 
          ul.appendChild(li); 
        }); 
        this.enableListDrag(ul); 
        c.appendChild(ul); 
      },
      
      enableListDrag(ul) { 
        let src = null; 
        ul.addEventListener('dragstart', e => { 
          src = e.target.closest('li'); 
          if (src) {
            e.dataTransfer.effectAllowed = 'move';
            src.classList.add('opacity-50');
          }
        }); 
        ul.addEventListener('dragover', e => e.preventDefault()); 
        ul.addEventListener('drop', e => { 
          e.preventDefault(); 
          const tgt = e.target.closest('li'); 
          if (src && tgt && src !== tgt) {
            ul.insertBefore(src, tgt.nextSibling === src ? tgt : tgt); 
          }
          if (src) src.classList.remove('opacity-50');
          src = null;
        }); 
        ul.addEventListener('dragend', () => {
          if (src) src.classList.remove('opacity-50');
          src = null;
        });
      },
      
      match(c, q, a) { 
        if (!q.matchingPairs || !q.matchingPairs.left || q.matchingPairs.left.length === 0) {
          c.innerHTML = '<p class="text-slate-400">Нет пар для сопоставления</p>';
          return;
        }
        const pairs = a?.pairs || {}; 
        const left = q.matchingPairs.left; 
        const right = q.matchingPairs.right || []; 
        const g = document.createElement('div'); 
        g.className = 'space-y-3'; 
        left.forEach(l => { 
          const row = document.createElement('div'); 
          row.className = 'flex items-center gap-2'; 
          const span = document.createElement('span');
          span.className = 'w-1/2 text-right text-slate-300';
          span.textContent = l;
          row.appendChild(span);
          
          const sel = document.createElement('select'); 
          sel.className = 'w-1/2 bg-slate-900 border border-slate-600 rounded p-2 text-slate-100'; 
          sel.innerHTML = '<option value="">-- Выберите --</option>' + 
            right.map(r => `<option value="${this.esc(r)}" ${pairs[l] === r ? 'selected' : ''}>${this.esc(r)}</option>`).join(''); 
          row.appendChild(sel); 
          g.appendChild(row); 
        }); 
        c.appendChild(g); 
      },
      
      textarea(c, q, a) { 
        const ta = document.createElement('textarea'); 
        ta.className = 'w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-slate-100 h-28 resize-y focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400'; 
        ta.placeholder = 'Введите развёрнутый ответ...';
        ta.value = a?.text || ''; 
        c.appendChild(ta); 
      },
      
      collectAnswer(el, q) {
        const ans = {}; 
        try {
          switch(q.type) {
            case 'single_choice': { 
              const c = el.querySelector('input[type="radio"]:checked'); 
              ans.selected = c ? c.value : null; 
              break; 
            }
            case 'multiple_choice': 
              ans.selected = Array.from(el.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value); 
              break;
            case 'fill_blank': { 
              const i = el.querySelector('input[type="text"]'); 
              ans.text = i ? i.value : ''; 
              break; 
            }
            case 'ordering': 
              ans.order = Array.from(el.querySelectorAll('li[draggable]')).map(li => li.dataset.optionId); 
              break;
            case 'matching': { 
              const sels = el.querySelectorAll('select'); 
              const p = {}; 
              sels.forEach(s => { 
                const span = s.parentElement?.querySelector('span'); 
                if (span && s.value) p[span.textContent.trim()] = s.value; 
              }); 
              ans.pairs = p; 
              break; 
            }
            case 'open_text': { 
              const ta = el.querySelector('textarea'); 
              ans.text = ta ? ta.value : ''; 
              break; 
            }
          }
        } catch(err) {
          console.error('Error collecting answer:', err);
        }
        return ans;
      }
    };

    // ──────────────────────── МОДАЛЬНОЕ ОКНО ────────────────────────

      hide() {

        c.classList.add('hidden');

        c.innerHTML = '';

        document.getElementById('timeout-ok-btn').addEventListener('click', () => {

      showTimeout() {

      },
      
      activeQuiz() {
        const s = State.activeSession; 
        if (!s) return; 
        const quiz = State.quizzes.find(q => q.id === s.quizId);
        if (!quiz) {
          App.navigate('quizzes');
          return;
        }
        
        const c = document.getElementById('view-container'); 
        const sec = quiz.sections[s.sectionIndex];
        if (!sec || !sec.questions || sec.questions.length === 0) {
          App.finishQuiz();
          return;
        }
        
        const q = sec.questions[s.questionIndex];
        if (!q) {
          App.navigateQuestion(0);
          return;
        }
        
        // Прогресс-бар
        const totalQuestions = quiz.sections.reduce((acc, sec) => acc + (sec.questions ? sec.questions.length : 0), 0);
        const answeredCount = Object.keys(s.answers).length;
        const progressPercent = Math.round((answeredCount / totalQuestions) * 100);
        
        c.innerHTML = `
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold">${this.esc(quiz.title)}</h2>

            <div class="flex justify-between text-sm text-slate-300 mb-1">
              <span>${this.esc(sec.title)} — вопрос ${s.questionIndex + 1}/${sec.questions.length}</span>

        prev.className = 'px-4 py-2 bg-slate-700 rounded-lg disabled:opacity-50 hover:bg-slate-600 transition'; 
        prev.textContent = '← Назад'; 
        prev.disabled = s.questionIndex === 0 && s.sectionIndex === 0;

                       s.questionIndex === sec.questions.length - 1;

    // ──────────────────────── РЕДАКТОР ТЕСТОВ С DRAG & DROP ────────────────────────
    const Editor = {

      editQuiz(quizId) {

      buildEditorLayout(quiz) {
        const timeLimitMinutes = quiz.timeLimit > 0 ? Math.floor(quiz.timeLimit / 60) : 0;
        const timeLimitSeconds = quiz.timeLimit > 0 ? quiz.timeLimit % 60 : 0;
        
        return `
          <div class="flex justify-between items-center mb-4">

            <div class="flex gap-2 items-center">

            </div>
          </div>
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-4">
              <div class="bg-slate-800 p-4 rounded-xl space-y-3">
                <div>
                  <label class="block text-sm mb-1 text-slate-300">Название теста</label>
                  <input id="quiz-title" class="w-full bg-slate-900 border border-slate-700 p-2 rounded focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500" value="${this.esc(quiz.title)}">
                </div>
                <div>
                  <label class="block text-sm mb-1 text-slate-300">Описание</label>
                  <input id="quiz-description" class="w-full bg-slate-900 border border-slate-700 p-2 rounded focus:border-cyan-500" value="${this.esc(quiz.description || '')}" placeholder="Краткое описание теста">
                </div>
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="block text-sm mb-1 text-slate-300">⏱️ Ограничение времени</label>
                    <div class="flex gap-2">
                      <div class="flex-1">
                        <input id="quiz-time-min" type="number" class="w-full bg-slate-900 border border-slate-700 p-2 rounded" value="${timeLimitMinutes}" min="0" placeholder="Мин">
                        <span class="text-xs text-slate-500">Минут</span>
                      </div>
                      <div class="flex-1">
                        <input id="quiz-time-sec" type="number" class="w-full bg-slate-900 border border-slate-700 p-2 rounded" value="${timeLimitSeconds}" min="0" max="59" placeholder="Сек">
                        <span class="text-xs text-slate-500">Секунд</span>
                      </div>
                    </div>
                  </div>
                  <div>
                    <label class="block text-sm mb-1 text-slate-300">Перемешивать вопросы</label>
                    <label class="flex items-center gap-2 mt-2 cursor-pointer">
                      <input id="quiz-shuffle" type="checkbox" class="accent-cyan-500 w-4 h-4" ${quiz.shuffleQuestions ? 'checked' : ''}>
                      <span class="text-sm">Случайный порядок</span>
                    </label>
                  </div>
                </div>
              </div>
              <div class="bg-slate-800 p-4 rounded-xl">
                <div class="flex justify-between items-center mb-3">
                  <h3 class="font-semibold">Секции и вопросы</h3>
                  <span class="text-xs text-slate-400">↕️ Drag & Drop</span>
                </div>
                <div id="sections-container" class="space-y-4"></div>
                <button id="add-section-btn" class="mt-3 px-3 py-1.5 bg-slate-700 rounded text-sm hover:bg-slate-600 transition">+ Добавить секцию</button>
              </div>
            </div>
            <div class="bg-slate-800/60 p-4 rounded-xl h-fit sticky top-20">
              <h3 class="font-semibold mb-3">📦 Банк вопросов</h3>
              <div id="bank-list" class="space-y-2 max-h-96 overflow-y-auto custom-scroll mb-3"></div>
              <button id="create-bank-question-btn" class="w-full px-3 py-2 bg-cyan-700 rounded text-sm hover:bg-cyan-600 transition">+ Новый вопрос в банк</button>
              <p class="text-xs text-slate-500 mt-2">Перетащите вопрос в секцию для копирования</p>
            </div>
          </div>
        `;
      },

      bindEditorEvents(quiz) {
        document.getElementById('back-quizzes').onclick = () => { 
          State.saveQuizzes(); 
          App.navigate('quizzes'); 
        };
        
        document.getElementById('quiz-title').oninput = (e) => { 
          quiz.title = e.target.value; 
          State.saveQuizzes(); 
        };
        
        document.getElementById('quiz-description').oninput = (e) => {
          quiz.description = e.target.value;
          State.saveQuizzes();
        };
        
        // Обработчик времени
        const updateTimeLimit = () => {
          const min = parseInt(document.getElementById('quiz-time-min').value) || 0;
          const sec = parseInt(document.getElementById('quiz-time-sec').value) || 0;
          quiz.timeLimit = (min * 60) + sec;
          State.saveQuizzes();
        };
        
        document.getElementById('quiz-time-min').oninput = updateTimeLimit;
        document.getElementById('quiz-time-sec').oninput = updateTimeLimit;
        
        document.getElementById('quiz-shuffle').onchange = (e) => {
          quiz.shuffleQuestions = e.target.checked;
          State.saveQuizzes();
        };
        
        this.renderSections(quiz);
        this.renderBank();
        
        document.getElementById('add-section-btn').onclick = () => this.addSection(quiz);
        document.getElementById('create-bank-question-btn').onclick = () => this.openQuestionEditor(null);
      },

      // Остальные методы Editor остаются без изменений...
      renderSections(quiz) {
        const cont = document.getElementById('sections-container'); 
        if (!cont) return;
        cont.innerHTML = '';
        
        if (quiz.sections.length === 0) {
          cont.innerHTML = '<p class="text-slate-500 text-center py-4">Нет секций. Добавьте первую секцию.</p>';
          return;
        }
        
        quiz.sections.forEach((sec, sIdx) => {
          const div = document.createElement('div'); 
          div.className = 'bg-slate-900/70 border-2 border-slate-700 rounded-lg p-4 transition-all hover:border-slate-600';
          div.dataset.sectionIndex = sIdx;
          
          DragDrop.makeSectionDraggable(div, sIdx);
          DragDrop.makeSectionDropZone(div, sIdx);
          
          div.innerHTML = `
            <div class="flex justify-between items-center mb-3">
              <div class="flex items-center gap-2 flex-1">
                <span class="drag-handle text-slate-500 text-lg no-select">⋮⋮</span>
                <div class="flex-1">
                  <input class="section-title bg-slate-800 rounded px-2 py-1 w-full text-sm" value="${this.esc(sec.title)}" placeholder="Название секции">
                  <div class="flex items-center gap-2 mt-1">
                    <label class="text-xs text-slate-400">Вес:</label>
                    <input type="number" class="section-weight bg-slate-800 rounded px-1 py-0.5 w-16 text-xs" value="${sec.weight || 1}" min="0" step="0.1">
                  </div>
                </div>
              </div>
              <div class="flex gap-2 ml-2">
                <button class="add-q-btn text-xs px-2 py-1 bg-cyan-600 rounded hover:bg-cyan-500 transition">+ Вопрос</button>
                <button class="del-sec-btn text-xs px-2 py-1 bg-red-800/60 rounded hover:bg-red-700/60 transition">✕</button>
              </div>
            </div>
            <div class="questions-list space-y-2 pl-6 min-h-[20px]" data-section-index="${sIdx}"></div>
          `;
          
          const titleInp = div.querySelector('.section-title');
          titleInp.oninput = (e) => { 
            sec.title = e.target.value; 
            State.saveQuizzes(); 
          };
          
          const weightInp = div.querySelector('.section-weight');
          weightInp.oninput = (e) => { 
            sec.weight = parseFloat(e.target.value) || 1; 
            State.saveQuizzes(); 
          };
          
          div.querySelector('.del-sec-btn').onclick = (e) => {
            e.stopPropagation();
            if (confirm(`Удалить секцию "${sec.title}" и все вопросы в ней?`)) {
              quiz.sections.splice(sIdx, 1); 
              State.saveQuizzes(); 
              this.renderSections(quiz); 
            }
          };
          
          div.querySelector('.add-q-btn').onclick = (e) => {
            e.stopPropagation();
            this.openQuestionEditor(null, (newQ) => { 
              sec.questions = sec.questions || [];
              sec.questions.push(newQ); 
              State.saveQuizzes(); 
              this.renderSections(quiz); 
            }); 
          };
          
          const qList = div.querySelector('.questions-list');
          
          if (sec.questions && sec.questions.length > 0) {
            sec.questions.forEach((q, qIdx) => {
              const qDiv = document.createElement('div'); 
              qDiv.className = 'flex justify-between items-center bg-slate-800 p-2 rounded text-sm border border-transparent hover:border-slate-600 transition-all cursor-pointer';
              qDiv.dataset.questionIndex = qIdx;
              qDiv.dataset.sectionIndex = sIdx;
              
              DragDrop.makeQuestionDraggable(qDiv, sIdx, qIdx);
              DragDrop.makeQuestionDropZone(qDiv, sIdx, qIdx);
              
              const typeInfo = APP_DATA.questionTypes[q.type] || { icon: '❓', name: 'Неизвестный' };
              qDiv.innerHTML = `
                <div class="flex items-center gap-2 flex-1 min-w-0">
                  <span class="drag-handle text-slate-500 text-xs no-select">⋮</span>
                  <span class="truncate text-slate-200">${this.esc(q.text?.substring(0, 50) || 'Без текста')}</span>
                  <span class="text-xs text-slate-500 whitespace-nowrap">${typeInfo.icon} ${typeInfo.name}</span>
                </div>
                <div class="flex gap-1 ml-2">
                  <button class="edit-q-btn text-xs px-1.5 py-0.5 bg-slate-600 rounded hover:bg-slate-500 transition">✎</button>
                  <button class="rm-q-btn text-xs px-1.5 py-0.5 bg-red-800/50 rounded hover:bg-red-700/50 transition">✕</button>
                </div>
              `;
              
              qDiv.querySelector('.edit-q-btn').onclick = (e) => {
                e.stopPropagation();
                this.openQuestionEditor(q, (updated) => { 
                  sec.questions[qIdx] = updated; 
                  State.saveQuizzes(); 
                  this.renderSections(quiz); 
                });
              };
              
              qDiv.querySelector('.rm-q-btn').onclick = (e) => {
                e.stopPropagation();
                sec.questions.splice(qIdx, 1); 
                State.saveQuizzes(); 
                this.renderSections(quiz); 
              };
              
              qList.appendChild(qDiv);
            });
          }
          
          cont.appendChild(div);
        });
        
        setTimeout(() => {
          document.querySelectorAll('.questions-list').forEach(list => {
            const sectionIndex = parseInt(list.dataset.sectionIndex);
            list.addEventListener('dragover', (e) => {
              if (DragDrop.draggedBankItem) {
                e.preventDefault();
                list.classList.add('drag-over');
              }
            });
            list.addEventListener('dragleave', (e) => {
              if (!list.contains(e.relatedTarget)) {
                list.classList.remove('drag-over');
              }
            });
            list.addEventListener('drop', (e) => {
              e.preventDefault();
              list.classList.remove('drag-over');
              if (DragDrop.draggedBankItem) {
                DragDrop.handleBankItemDrop(sectionIndex);
                DragDrop.cleanup();
              }
            });
          });
        }, 100);
      },

      renderBank() {
        const list = document.getElementById('bank-list'); 
        if (!list) return;
        list.innerHTML = '';
        
        if (State.questionBank.length === 0) {
          list.innerHTML = '<p class="text-slate-500 text-center py-4 text-sm">Банк вопросов пуст</p>';
          return;
        }
        
        State.questionBank.forEach((q, idx) => {
          const div = document.createElement('div'); 
          div.className = 'flex justify-between items-center bg-slate-700/50 p-2 rounded text-sm border border-transparent hover:border-cyan-500/50 transition-all';
          
          DragDrop.makeBankItemDraggable(div, q);
          
          const typeInfo = APP_DATA.questionTypes[q.type] || { icon: '❓' };
          div.innerHTML = `
            <span class="truncate flex-1 text-slate-300">
              ${this.esc(q.text?.substring(0, 40) || 'Без текста')} 
              <span class="text-xs text-slate-500">${typeInfo.icon}</span>
            </span>
            <div class="flex gap-1 ml-2">
              <button class="add-to-quiz-btn text-xs px-2 py-0.5 bg-cyan-600 rounded hover:bg-cyan-500 transition" title="Добавить в последнюю секцию">+</button>
              <button class="edit-bank-btn text-xs px-1.5 bg-slate-500 rounded hover:bg-slate-400 transition">✎</button>
              <button class="del-bank-btn text-xs px-1.5 bg-red-800/50 rounded hover:bg-red-700/50 transition">✕</button>
            </div>
          `;
          
          div.querySelector('.add-to-quiz-btn').onclick = (e) => {
            e.stopPropagation();
            const quiz = State.quizzes.find(q => q.id === this.currentQuizId);
            if (!quiz) {
              alert('Редактор теста не открыт!');
              return;
            }
            if (quiz.sections.length === 0) { 
              alert('Создайте хотя бы одну секцию в тесте.');
              return;
            }
            const lastSection = quiz.sections[quiz.sections.length - 1];
            lastSection.questions = lastSection.questions || [];
            lastSection.questions.push(cloneQuestion({...q, id: generateId()}));
            State.saveQuizzes(); 
            this.renderSections(quiz); 
          };
          
          div.querySelector('.edit-bank-btn').onclick = (e) => {
            e.stopPropagation();
            this.openQuestionEditor(q, (updated) => { 
              State.questionBank[idx] = updated; 
              State.saveBank(); 
              this.renderBank(); 
            });
          };
          
          div.querySelector('.del-bank-btn').onclick = (e) => {
            e.stopPropagation();
            if (confirm('Удалить вопрос из банка?')) {
              State.questionBank.splice(idx, 1); 
              State.saveBank(); 
              this.renderBank(); 
            }
          };
          
          list.appendChild(div);
        });
      },

      addSection(quiz) {
        quiz.sections.push({ 
          id: generateId(), 
          title: 'Новая секция', 
          weight: 1, 
          questions: [] 
        });
        State.saveQuizzes(); 
        this.renderSections(quiz);
      },

      openQuestionEditor(existingQuestion, onSave) {
        const q = existingQuestion ? cloneQuestion(existingQuestion) : { 
          id: generateId(), 
          type: 'single_choice', 
          text: '', 
          weight: 1, 
          options: [], 
          correctAnswer: '', 
          orderOptions: [], 
          matchingPairs: { left: [], right: [], correctMapping: {} } 
        };
        
        let html = `
          <h3 class="text-xl font-bold mb-4">${existingQuestion ? 'Редактировать' : 'Новый'} вопрос</h3>
          <div class="space-y-3">
            <div>
              <label class="block text-sm text-slate-300 mb-1">Текст вопроса</label>
              <input id="eq-text" class="w-full bg-slate-900 border border-slate-700 p-2 rounded focus:border-cyan-500" value="${this.esc(q.text)}" placeholder="Введите текст вопроса">
            </div>
            <div class="flex gap-3">
              <div>
                <label class="block text-sm text-slate-300 mb-1">Тип</label>
                <select id="eq-type" class="bg-slate-900 border border-slate-700 p-2 rounded">
                  ${Object.values(APP_DATA.questionTypes).map(t => `<option value="${t.id}" ${q.type === t.id ? 'selected' : ''}>${t.icon} ${t.name}</option>`).join('')}
                </select>
              </div>
              <div>
                <label class="block text-sm text-slate-300 mb-1">Вес</label>
                <input id="eq-weight" type="number" class="bg-slate-900 border border-slate-700 p-2 rounded w-20" value="${q.weight}" min="0" step="0.1">
              </div>
            </div>
            <div id="eq-options-area"></div>
            <div class="flex justify-end gap-2 mt-4 pt-4 border-t border-slate-700">
              <button id="eq-save" class="px-4 py-2 bg-cyan-600 rounded hover:bg-cyan-500 transition">Сохранить в тест</button>
              <button id="eq-save-bank" class="px-4 py-2 bg-slate-600 rounded hover:bg-slate-500 transition">В банк</button>
              <button id="eq-cancel" class="px-4 py-2 bg-slate-700 rounded hover:bg-slate-600 transition">Отмена</button>
            </div>
          </div>
        `;
        
        Modal.show(html);
        
        const typeSelect = document.getElementById('eq-type');
        const renderOpts = () => this.renderQuestionOptions(q);
        
        typeSelect.onchange = () => { 
          q.type = typeSelect.value; 
          if (['single_choice', 'multiple_choice'].includes(q.type)) {
            if (!q.options) q.options = [];
            q.correctAnswer = '';
            q.orderOptions = [];
            q.matchingPairs = { left: [], right: [], correctMapping: {} };
          } else if (q.type === 'fill_blank') {
            if (!q.correctAnswer) q.correctAnswer = '';
            q.options = [];
            q.orderOptions = [];
            q.matchingPairs = { left: [], right: [], correctMapping: {} };
          } else if (q.type === 'ordering') {
            if (!q.orderOptions) q.orderOptions = [];
            q.options = [];
            q.correctAnswer = '';
            q.matchingPairs = { left: [], right: [], correctMapping: {} };
          } else if (q.type === 'matching') {
            if (!q.matchingPairs) q.matchingPairs = { left: [], right: [], correctMapping: {} };
            q.options = [];
            q.correctAnswer = '';
            q.orderOptions = [];
          } else if (q.type === 'open_text') {
            q.options = [];
            q.correctAnswer = '';
            q.orderOptions = [];
            q.matchingPairs = { left: [], right: [], correctMapping: {} };
          }
          renderOpts(); 
        };
        
        renderOpts();
        
        document.getElementById('eq-save').onclick = () => { 
          if (!this.validateAndCollect(q)) return;
          if (onSave) onSave(q); 
          Modal.hide(); 
        };
        
        document.getElementById('eq-save-bank').onclick = () => { 
          if (!this.validateAndCollect(q)) return;
          const copy = cloneQuestion(q);
          copy.id = generateId();
          State.questionBank.push(copy); 
          State.saveBank(); 
          if (onSave) onSave(q); 
          Modal.hide(); 
        };
        
        document.getElementById('eq-cancel').onclick = () => Modal.hide();
      },

      validateAndCollect(q) {
        const textEl = document.getElementById('eq-text');
        const weightEl = document.getElementById('eq-weight');
        
        if (!textEl || !weightEl) return false;
        
        q.text = textEl.value.trim();
        if (!q.text) {
          alert('Введите текст вопроса!');
          return false;
        }
        
        q.weight = parseFloat(weightEl.value) || 1;
        if (q.weight < 0) {
          alert('Вес не может быть отрицательным!');
          return false;
        }
        
        if (['single_choice', 'multiple_choice'].includes(q.type)) {
          if (!q.options || q.options.length < 2) {
            alert('Добавьте минимум 2 варианта ответа!');
            return false;
          }
          if (q.type === 'single_choice' && !q.options.some(o => o.correct)) {
            alert('Выберите правильный вариант ответа!');
            return false;
          }
          if (q.type === 'multiple_choice' && !q.options.some(o => o.correct)) {
            alert('Выберите хотя бы один правильный вариант!');
            return false;
          }
        } else if (q.type === 'fill_blank') {
          const corrEl = document.getElementById('eq-corr');
          if (corrEl) q.correctAnswer = corrEl.value.trim();
          if (!q.correctAnswer) {
            alert('Введите правильный ответ!');
            return false;
          }
        } else if (q.type === 'ordering') {
          if (!q.orderOptions || q.orderOptions.length < 2) {
            alert('Добавьте минимум 2 элемента для сортировки!');
            return false;
          }
        } else if (q.type === 'matching') {
          if (!q.matchingPairs || !q.matchingPairs.left || q.matchingPairs.left.length < 2) {
            alert('Добавьте минимум 2 пары для сопоставления!');
            return false;
          }
        }
        
        return true;
      },

      renderQuestionOptions(q) {
        const area = document.getElementById('eq-options-area'); 
        if (!area) return;
        area.innerHTML = '';
        
        if (['single_choice', 'multiple_choice'].includes(q.type)) {
          area.innerHTML = `
            <div class="space-y-2">
              <h4 class="text-sm font-semibold text-slate-300">Варианты ответов</h4>
              <div id="opts-list" class="space-y-2"></div>
              <button id="add-opt" class="text-xs px-2 py-1 bg-slate-600 rounded hover:bg-slate-500 transition">+ Добавить вариант</button>
            </div>
          `;
          
          const renderOptsList = () => {
            const list = document.getElementById('opts-list'); 
            if (!list) return;
            list.innerHTML = '';
            if (!q.options) q.options = [];
            q.options.forEach((o, i) => {
              const d = document.createElement('div'); 
              d.className = 'flex items-center gap-2';
              d.innerHTML = `
                <input class="opt-text bg-slate-900 border border-slate-700 p-1 rounded flex-1 text-sm" value="${this.esc(o.text)}" placeholder="Текст варианта">
                <label class="flex items-center gap-1 text-xs cursor-pointer">
                  <input type="${q.type === 'single_choice' ? 'radio' : 'checkbox'}" name="correct-opt" class="opt-correct accent-cyan-500" ${o.correct ? 'checked' : ''}>
                  Верный
                </label>
                <button class="del-opt text-red-400 hover:text-red-300">✕</button>
              `;
              d.querySelector('.opt-text').oninput = e => { q.options[i].text = e.target.value; };
              d.querySelector('.opt-correct').onchange = e => { 
                if (q.type === 'single_choice') {
                  q.options.forEach((opt, j) => opt.correct = (j === i));
                } else {
                  q.options[i].correct = e.target.checked; 
                }
                renderOptsList();
              };
              d.querySelector('.del-opt').onclick = () => { 
                q.options.splice(i, 1); 
                renderOptsList(); 
              };
              list.appendChild(d);
            });
          };
          
          renderOptsList();
          document.getElementById('add-opt').onclick = () => { 
            if (!q.options) q.options = [];
            q.options.push({ id: generateId(), text: '', correct: false, weight: 0 }); 
            renderOptsList(); 
          };
          
        } else if (q.type === 'fill_blank') {
          area.innerHTML = `
            <div>
              <label class="block text-sm text-slate-300 mb-1">Правильный ответ</label>
              <input id="eq-corr" class="w-full bg-slate-900 border border-slate-700 p-2 rounded" value="${this.esc(q.correctAnswer || '')}" placeholder="Введите правильный ответ">
              <label class="flex items-center gap-2 mt-2 text-xs text-slate-400">
                <input type="checkbox" id="eq-case-sensitive" ${q.widgetConfig?.caseSensitive ? 'checked' : ''}>
                Учитывать регистр
              </label>
            </div>
          `;
          document.getElementById('eq-corr').oninput = e => q.correctAnswer = e.target.value;
          document.getElementById('eq-case-sensitive').onchange = e => {
            if (!q.widgetConfig) q.widgetConfig = {};
            q.widgetConfig.caseSensitive = e.target.checked;
          };
          
        } else if (q.type === 'ordering') {
          area.innerHTML = `
            <div>
              <h4 class="text-sm font-semibold text-slate-300 mb-2">Элементы порядка (позиция задаёт правильный порядок)</h4>
              <div id="ord-list" class="space-y-2"></div>
              <button id="add-ord" class="text-xs px-2 py-1 bg-slate-600 rounded hover:bg-slate-500 transition mt-2">+ Добавить элемент</button>
            </div>
          `;
          
          const renderOrd = () => {
            const l = document.getElementById('ord-list'); 
            if (!l) return;
            l.innerHTML = '';
            if (!q.orderOptions) q.orderOptions = [];
            q.orderOptions.forEach((o, i) => {
              const d = document.createElement('div'); 
              d.className = 'flex items-center gap-2';
              d.innerHTML = `
                <input class="ord-text bg-slate-900 border border-slate-700 p-1 rounded flex-1 text-sm" value="${this.esc(o.text)}" placeholder="Текст элемента">
                <input type="number" class="ord-pos bg-slate-900 border border-slate-700 p-1 rounded w-16 text-sm" value="${o.position}" min="1" placeholder="Поз.">
                <button class="del-ord text-red-400 hover:text-red-300">✕</button>
              `;
              d.querySelector('.ord-text').oninput = e => { q.orderOptions[i].text = e.target.value; };
              d.querySelector('.ord-pos').oninput = e => { q.orderOptions[i].position = parseInt(e.target.value) || 0; };
              d.querySelector('.del-ord').onclick = () => { 
                q.orderOptions.splice(i, 1); 
                renderOrd(); 
              };
              l.appendChild(d);
            });
          };
          
          renderOrd();
          document.getElementById('add-ord').onclick = () => { 
            if (!q.orderOptions) q.orderOptions = [];
            q.orderOptions.push({ 
              id: generateId(), 
              text: '', 
              position: (q.orderOptions.length + 1) 
            }); 
            renderOrd(); 
          };
          
        } else if (q.type === 'matching') {
          area.innerHTML = `
            <div class="space-y-3">
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <h4 class="text-sm font-semibold text-slate-300 mb-1">Левые элементы</h4>
                  <div id="left-list" class="space-y-1"></div>
                  <button id="add-left" class="text-xs px-2 py-1 bg-slate-600 rounded hover:bg-slate-500 transition mt-1">+</button>
                </div>
                <div>
                  <h4 class="text-sm font-semibold text-slate-300 mb-1">Правые элементы</h4>
                  <div id="right-list" class="space-y-1"></div>
                  <button id="add-right" class="text-xs px-2 py-1 bg-slate-600 rounded hover:bg-slate-500 transition mt-1">+</button>
                </div>
              </div>
              <div>
                <h4 class="text-sm font-semibold text-slate-300 mb-2">Связи (выберите соответствия)</h4>
                <div id="pairs-list" class="space-y-2"></div>
              </div>
            </div>
          `;
          
          const renderPairs = () => {
            const pl = document.getElementById('pairs-list'); 
            if (!pl) return;
            pl.innerHTML = '';
            if (!q.matchingPairs) q.matchingPairs = { left: [], right: [], correctMapping: {} };
            if (!q.matchingPairs.correctMapping) q.matchingPairs.correctMapping = {};
            
            (q.matchingPairs.left || []).forEach((left) => {
              const d = document.createElement('div'); 
              d.className = 'flex items-center gap-2 text-sm';
              d.innerHTML = `
                <span class="w-1/3 text-slate-300">${this.esc(left)}</span>
                <span class="text-slate-500">→</span>
                <select class="pair-sel bg-slate-900 border border-slate-700 p-1 rounded flex-1 text-sm">
                  <option value="">-- Выберите --</option>
                  ${(q.matchingPairs.right || []).map(r => `<option value="${this.esc(r)}" ${(q.matchingPairs.correctMapping[left] === r) ? 'selected' : ''}>${this.esc(r)}</option>`).join('')}
                </select>
              `;
              d.querySelector('.pair-sel').onchange = (e) => { 
                if (!q.matchingPairs.correctMapping) q.matchingPairs.correctMapping = {}; 
                if (e.target.value) {
                  q.matchingPairs.correctMapping[left] = e.target.value; 
                } else {
                  delete q.matchingPairs.correctMapping[left];
                }
              };
              pl.appendChild(d);
            });
          };
          
          const renderSides = () => { 
            const leftList = document.getElementById('left-list');
            const rightList = document.getElementById('right-list');
            if (!leftList || !rightList) return;
            
            if (!q.matchingPairs) q.matchingPairs = { left: [], right: [], correctMapping: {} };
            if (!q.matchingPairs.left) q.matchingPairs.left = [];
            if (!q.matchingPairs.right) q.matchingPairs.right = [];
            
            leftList.innerHTML = q.matchingPairs.left.map((l, i) => `
              <div class="flex items-center gap-1">
                <input class="left-val bg-slate-900 border border-slate-700 p-1 rounded flex-1 text-sm" value="${this.esc(l)}" placeholder="Левый элемент">
                <button class="del-left text-red-400 hover:text-red-300 text-xs">✕</button>
              </div>
            `).join('');
            
            rightList.innerHTML = q.matchingPairs.right.map((r, j) => `
              <div class="flex items-center gap-1">
                <input class="right-val bg-slate-900 border border-slate-700 p-1 rounded flex-1 text-sm" value="${this.esc(r)}" placeholder="Правый элемент">
                <button class="del-right text-red-400 hover:text-red-300 text-xs">✕</button>
              </div>
            `).join('');
            
            leftList.querySelectorAll('.left-val').forEach((inp, i) => {
              inp.oninput = e => { 
                const oldValue = q.matchingPairs.left[i];
                q.matchingPairs.left[i] = e.target.value;
                if (q.matchingPairs.correctMapping && oldValue !== e.target.value) {
                  if (q.matchingPairs.correctMapping[oldValue]) {
                    q.matchingPairs.correctMapping[e.target.value] = q.matchingPairs.correctMapping[oldValue];
                    delete q.matchingPairs.correctMapping[oldValue];
                  }
                }
              };
            });
            
            rightList.querySelectorAll('.right-val').forEach((inp, j) => {
              inp.oninput = e => { q.matchingPairs.right[j] = e.target.value; };
            });
            
            leftList.querySelectorAll('.del-left').forEach((btn, i) => {
              btn.onclick = () => { 
                const removed = q.matchingPairs.left.splice(i, 1)[0];
                if (q.matchingPairs.correctMapping) {
                  delete q.matchingPairs.correctMapping[removed];
                }
                renderSides(); 
                renderPairs(); 
              };
            });
            
            rightList.querySelectorAll('.del-right').forEach((btn, j) => {
              btn.onclick = () => { 
                const removed = q.matchingPairs.right.splice(j, 1)[0];
                if (q.matchingPairs.correctMapping) {
                  Object.keys(q.matchingPairs.correctMapping).forEach(key => {
                    if (q.matchingPairs.correctMapping[key] === removed) {
                      delete q.matchingPairs.correctMapping[key];
                    }
                  });
                }
                renderSides(); 
                renderPairs(); 
              };
            });
          };
          
          renderSides(); 
          renderPairs();
          
          document.getElementById('add-left').onclick = () => { 
            if (!q.matchingPairs) q.matchingPairs = { left: [], right: [], correctMapping: {} };
            if (!q.matchingPairs.left) q.matchingPairs.left = [];
            q.matchingPairs.left.push('Новый левый');
            renderSides(); 
            renderPairs(); 
          };
          
          document.getElementById('add-right').onclick = () => { 
            if (!q.matchingPairs) q.matchingPairs = { left: [], right: [], correctMapping: {} };
            if (!q.matchingPairs.right) q.matchingPairs.right = [];
            q.matchingPairs.right.push('Новый правый');
            renderSides(); 
            renderPairs(); 
          };
          
        } else if (q.type === 'open_text') {
          area.innerHTML = '<p class="text-slate-400 text-sm">Открытый ответ не требует предварительных настроек. Ответ будет оценён вручную.</p>';
        }
      },

      esc(s) { 
        if (s === null || s === undefined) return '';
        const d = document.createElement('div'); 
        d.textContent = String(s); 
        return d.innerHTML; 
      }
    };

    // ──────────────────────── ЯДРО ПРИЛОЖЕНИЯ ────────────────────────
    const App = {
      init() { 
        DragDrop.init();
        Modal.init(); 
        this.updateNav(); 
        this.navigate(State.currentView);
        
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') {
            Modal.hide();
          }
        });
      },
      
      navigate(view, params) { 
        State.currentView = view; 
        this.updateNav(); 
        const c = document.getElementById('view-container'); 
        if (!c) return;
        c.innerHTML = ''; 
        switch(view) { 
          case 'quizzes': Views.quizzes(); break; 
          case 'quiz-active': Views.activeQuiz(); break; 
          case 'results': Views.results(params || { totalEarned: 0, totalMax: 0 }); break; 
          case 'history': Views.history(); break; 
          default: Views.quizzes(); 
        } 
      },
      
      updateNav() { 
        const n = document.getElementById('main-nav'); 
        if (!n) return;
        n.innerHTML = `
          <button class="nav-link px-3 py-1 rounded transition ${State.currentView === 'quizzes' ? 'bg-slate-700' : 'hover:bg-slate-800'}" data-view="quizzes">📋 Тесты</button>
          <button class="nav-link px-3 py-1 rounded transition ${State.currentView === 'history' ? 'bg-slate-700' : 'hover:bg-slate-800'}" data-view="history">📊 История</button>
        `; 
        n.querySelectorAll('.nav-link').forEach(b => b.onclick = e => this.navigate(e.target.dataset.view)); 
      },
      
      startQuiz(id) { 
        const quiz = State.quizzes.find(q => q.id === id); 
        if (!quiz) {
          alert('Тест не найден!');
          return;
        }
        const totalQuestions = quiz.sections.reduce((a, s) => a + (s.questions ? s.questions.length : 0), 0);
        if (totalQuestions === 0) {
          alert('Тест не содержит вопросов!');
          return;
        }
        
        State.activeSession = {
          quizId: id, 
          answers: {}, 
          startTime: Date.now(), 
          sectionIndex: 0, 
          questionIndex: 0
        };
        
        // Запуск таймера если есть ограничение
        if (quiz.timeLimit > 0) {
          Timer.start(
            quiz.timeLimit,
            (remaining, total) => {
              // Колбек тика (опционально можно обновлять UI)
            },
            () => {
              // Колбек при истечении времени
              Modal.showTimeout();
            }
          );
        }
        
        this.navigate('quiz-active'); 
      },
      
      navigateQuestion(d) { 
        const s = State.activeSession; 
        if (!s) return;
        const quiz = State.quizzes.find(q => q.id === s.quizId); 
        if (!quiz || !quiz.sections || quiz.sections.length === 0) {
          this.navigate('quizzes');
          return;
        }
        
        const sec = quiz.sections[s.sectionIndex];
        if (!sec || !sec.questions || sec.questions.length === 0) {
          if (s.sectionIndex < quiz.sections.length - 1) {
            s.sectionIndex++;
            s.questionIndex = 0;
          } else {
            this.finishQuiz();
            return;
          }
        }
        
        let nQ = s.questionIndex + d; 
        if (nQ >= sec.questions.length) { 
          if (s.sectionIndex < quiz.sections.length - 1) { 
            s.sectionIndex++; 
            s.questionIndex = 0; 
          } 
        } else if (nQ < 0) { 
          if (s.sectionIndex > 0) { 
            s.sectionIndex--; 
            s.questionIndex = quiz.sections[s.sectionIndex].questions.length - 1; 
          } else {
            s.questionIndex = 0;
          }
        } else {
          s.questionIndex = nQ;
        }
        
        this.navigate('quiz-active'); 
      },
      
      finishQuiz() { 
        const s = State.activeSession; 
        if (!s) return;
        const quiz = State.quizzes.find(q => q.id === s.quizId); 
        if (!quiz) return;
        
        const timedOut = Modal.hideTimeout || false;
        Modal.hideTimeout = false;
        
        let totalEarned = 0, totalMax = 0; 
        quiz.sections.forEach(sec => { 
          if (!sec.questions) return;
          sec.questions.forEach(q => { 
            const ans = s.answers[q.id] || {}; 
            const { earned, max } = evaluateQuestion(q, ans); 
            totalEarned += earned * (sec.weight || 1); 
            totalMax += max * (sec.weight || 1); 
          }); 
        }); 
        
        const dur = Timer.isRunning ? Timer.getElapsedSeconds() : 
                   ((Date.now() - s.startTime) / 1000);
        
        // Останавливаем таймер
        const wasTimerRunning = Timer.isRunning;
        Timer.stop();
        
        const rec = {
          quizId: quiz.id,
          quizTitle: quiz.title,
          timestamp: Date.now(),
          totalEarned,
          totalMax,
          duration: dur,
          timedOut: wasTimerRunning && dur >= quiz.timeLimit,
          answers: s.answers
        }; 
        
        const hist = State.history; 
        hist.push(rec); 
        State.history = hist; 
        State.activeSession = null; 
        
        this.navigate('results', { 
          totalEarned, 
          totalMax,
          timeElapsed: Math.round(dur),
          timedOut: rec.timedOut
        }); 
        
        // Скрываем модальное окно тайм-аута если открыто
        Modal.hideTimeout();
      }
    };

    window.App = App; 
    window.Editor = Editor;
    window.addEventListener('DOMContentLoaded', () => App.init());
  </script>
